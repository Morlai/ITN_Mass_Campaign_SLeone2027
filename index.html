<!DOCTYPE html> 
<html lang="en"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ITNs Campaign Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

body {
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Phone container */
.container {
    width: 360px;
    max-width: 100%;
    height: 100vh;
    max-height: 780px;
    background: #fff;
    border-radius: 30px;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
}

/* Background image */
.bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('background.png') no-repeat center/cover;
    z-index: 0;
}
.bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
}

/* Main content */
.content {
    position: relative;
    z-index: 2;
    padding: 20px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.login-card {
    background: rgba(255,255,255,0.96);
    border-radius: 24px;
    padding: 20px 16px;
    margin-top: 20px;
    backdrop-filter: blur(2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.logo {
    text-align: center;
    margin-bottom: 16px;
}
.logo img {
    width: 65px;
    border-radius: 50%;
    background: white;
    padding: 4px;
}

.input {
    width: 100%;
    padding: 14px 12px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 40px;
    font-size: 16px;
    background: #fff;
}

.password-wrapper {
    position: relative;
}
.password-wrapper input {
    padding-right: 50px;
}
.eye-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #555;
    font-size: 1.2rem;
}

.btn {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 40px;
    color: white;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
}
.btn:hover {
    transform: scale(1.02);
    opacity: 0.9;
}
.login {
    background: #2E86C1;
}
.scan {
    background: #1E8449;
}

.cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 20px 0 10px 0;
}
.card {
    border-radius: 20px;
    padding: 14px 6px;
    text-align: center;
    color: white;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}
.card:hover {
    transform: scale(1.02);
}
.card i {
    font-size: 26px;
}
.network { background: #D35400; }
.export { background: #2E86C1; }
.verify { background: #8E44AD; }
.language { background: #16A085; }

/* Curve and footer */
.curve-wrapper {
    position: relative;
    z-index: 2;
    margin-top: auto;
}
.curve {
    width: 100%;
    height: 50px;
    display: block;
}
.footer {
    background: #1E8449;
    padding: 12px 16px 20px;
    text-align: center;
    color: white;
    border-radius: 20px 20px 0 0;
}
.footer h4 {
    font-size: 11px;
    font-weight: normal;
}
.footer p {
    font-size: 13px;
    text-decoration: underline;
    font-weight: bold;
    margin-top: 4px;
}

/* Scanner modal */
#scannerModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
    flex-direction: column;
}
#reader {
    width: 280px;
    border-radius: 20px;
    overflow: hidden;
}
.close-btn {
    margin-top: 20px;
    padding: 10px 24px;
    background: #e74c3c;
    color: white;
    border: none;
    border-radius: 40px;
    font-size: 1rem;
    cursor: pointer;
}

/* Loading overlay */
.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    flex-direction: column;
}
.loading-spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #f3f3f3;
    border-top: 5px solid #2E86C1;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}
.loading-text {
    color: white;
    margin-top: 15px;
    font-size: 14px;
}
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Mobile responsive */
@media (max-width: 380px) {
    .container {
        width: 100%;
        height: 100vh;
        border-radius: 0;
    }
    .login-card {
        padding: 16px 12px;
    }
    .cards {
        gap: 10px;
    }
    .card {
        padding: 10px 4px;
        font-size: 11px;
    }
    .card i {
        font-size: 22px;
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="bg"></div>
    <div class="content">
        <div class="login-card">
            <div class="logo">
                <img src="ICF-SL Logo.jpg" alt="ICF-SL Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' fill=\'%232E86C1\'/%3E%3Ctext x=\'50\' y=\'55\' font-size=\'14\' fill=\'white\' text-anchor=\'middle\'%3EICF%3C/text%3E%3C/svg%3E'">
            </div>
            <input id="username" class="input" placeholder="USERNAME" autocomplete="off">
            <div class="password-wrapper">
                <input id="password" class="input" type="password" placeholder="PASSWORD">
                <i class="fa-solid fa-eye eye-icon" onclick="togglePassword()"></i>
            </div>
            <button id="loginBtn" class="btn login">LOGIN</button>
            <button id="scanBtn" class="btn scan" onclick="startScanner()">SCAN BADGE</button>
        </div>

        <div class="cards">
            <div class="card network" id="networkCard">
                <i class="fa-solid fa-wifi"></i>
                <span>NETWORK CHECK</span>
            </div>
            <div class="card export" id="exportCard">
                <i class="fa-solid fa-download"></i>
                <span>EXPORT CAMPAIGN LOGS</span>
            </div>
            <div class="card verify" id="verifyCard">
                <i class="fa-solid fa-fingerprint"></i>
                <span>VERIFY BENEFICIARY PRINT</span>
            </div>
            <div class="card language" onclick="toggleLanguage()">
                <i class="fa-solid fa-language"></i>
                <span id="langText">ENGLISH</span>
            </div>
        </div>
    </div>

    <!-- Curve + Footer -->
    <div class="curve-wrapper">
        <svg class="curve" viewBox="0 0 500 100" preserveAspectRatio="none">
            <path d="M0,65 C80,95 140,100 200,75 C260,50 320,40 380,60 C430,75 470,70 500,65 L500,100 L0,100 Z" fill="#1E8449"/>
        </svg>
        <div class="footer">
            <h4 id="devText">Developed By</h4>
            <p>Informatic Consultancy Firm-SL ©2026</p>
        </div>
    </div>
</div>

<!-- QR SCANNER MODAL -->
<div id="scannerModal">
    <div id="reader"></div>
    <button class="close-btn" onclick="stopScanner()">Close</button>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Authenticating...</div>
</div>

<script>
// Global variables
let isEnglish = true;
let html5QrCode;
let users = [];

// Show/Hide loading overlay
function showLoading() {
    document.getElementById('loadingOverlay').style.display = 'flex';
}
function hideLoading() {
    document.getElementById('loadingOverlay').style.display = 'none';
}

// Load CSV credentials from Keys.csv
async function loadCSV() {
    try {
        const response = await fetch("Keys.csv");
        if (!response.ok) {
            console.warn('Keys.csv not found. Using default demo users');
            users = [
                { username: "admin", password: "1234", role: "admin", page: "mscreen.html" },
                { username: "HHR2026", password: "123455", role: "hhr", page: "mregistration.html" },
                { username: "HHD2026", password: "123456", role: "hhd", page: "distribution.html" },
                { username: "monitor", password: "monitor123", role: "monitor", page: "monitoring.html" }
            ];
            return;
        }
        const csvText = await response.text();
        const lines = csvText.trim().split('\n');
        
        // Check if first line is header
        const firstLine = lines[0].toLowerCase();
        const hasHeader = firstLine.includes('username') || firstLine.includes('user');
        const startIndex = hasHeader ? 1 : 0;
        
        for (let i = startIndex; i < lines.length; i++) {
            const line = lines[i].trim();
            if (line === '') continue;
            
            // Parse CSV line (supports comma separated)
            const parts = line.split(',');
            if (parts.length >= 2) {
                users.push({
                    username: parts[0].trim(),
                    password: parts[1].trim(),
                    role: parts[2] ? parts[2].trim() : 'user',
                    page: parts[3] ? parts[3].trim() : getDefaultPage(parts[0].trim())
                });
            }
        }
        
        // If no users loaded, add default
        if (users.length === 0) {
            users = [
                { username: "admin", password: "1234", role: "admin", page: "mscreen.html" },
                { username: "HHR2026", password: "123455", role: "hhr", page: "mregistration.html" }
            ];
        }
        
        console.log('Credentials loaded:', users.length);
    } catch (error) {
        console.error('Error loading CSV:', error);
        users = [
            { username: "admin", password: "1234", role: "admin", page: "mscreen.html" },
            { username: "HHR2026", password: "123455", role: "hhr", page: "mregistration.html" }
        ];
    }
}

// Determine default page based on username pattern
function getDefaultPage(username) {
    const upperUser = username.toUpperCase();
    if (upperUser.includes('HHR')) {
        return 'mregistration.html';
    } else if (upperUser.includes('HHD')) {
        return 'distribution.html';
    } else if (upperUser.includes('ADMIN')) {
        return 'mscreen.html';
    } else if (upperUser.includes('MONITOR')) {
        return 'monitoring.html';
    } else {
        return 'mscreen.html';
    }
}

// Validate credentials
function validateCredentials(username, password) {
    return users.find(user => 
        user.username === username && user.password === password
    );
}

// Login handler
document.getElementById("loginBtn").addEventListener("click", async function() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    
    if (!username || !password) {
        alert("Please enter both username and password");
        return;
    }
    
    showLoading();
    
    // Ensure CSV is loaded
    if (users.length === 0) {
        await loadCSV();
    }
    
    // Simulate slight delay for better UX
    setTimeout(() => {
        const user = validateCredentials(username, password);
        
        if (user) {
            // Determine which page to load based on user role/username
            let targetPage = user.page || getDefaultPage(username);
            
            // If username contains HHR (case insensitive), go to registration page
            if (username.toUpperCase().includes('HHR')) {
                targetPage = 'mregistration.html';
            }
            // If username contains HHD, go to distribution page
            else if (username.toUpperCase().includes('HHD')) {
                targetPage = 'distribution.html';
            }
            // If username is admin or contains ADMIN, go to main screen
            else if (username.toLowerCase() === 'admin' || username.toUpperCase().includes('ADMIN')) {
                targetPage = 'mscreen.html';
            }
            
            console.log(`User ${username} redirected to: ${targetPage}`);
            
            // Redirect to the appropriate page
            document.body.innerHTML = `<iframe src="${targetPage}" style="width:100%;height:100vh;border:none;"></iframe>`;
        } else {
            hideLoading();
            alert("Invalid Username or Password. Please check your credentials.");
        }
    }, 800);
});

// Also handle Enter key press
document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        document.getElementById("loginBtn").click();
    }
});
document.getElementById("username").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        document.getElementById("loginBtn").click();
    }
});

// Toggle password visibility
function togglePassword() {
    const password = document.getElementById("password");
    const icon = document.querySelector(".eye-icon");
    if (password.type === "password") {
        password.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        password.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}

// Language toggle (English / French)
function toggleLanguage() {
    isEnglish = !isEnglish;
    const usernameField = document.getElementById("username");
    const passwordField = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const scanBtn = document.getElementById("scanBtn");
    const networkSpan = document.querySelector("#networkCard span");
    const exportSpan = document.querySelector("#exportCard span");
    const verifySpan = document.querySelector("#verifyCard span");
    const langSpan = document.getElementById("langText");
    const devText = document.getElementById("devText");

    if (!isEnglish) {
        usernameField.placeholder = "Nom d'utilisateur";
        passwordField.placeholder = "Mot de passe";
        loginBtn.innerText = "CONNEXION";
        scanBtn.innerText = "SCANNER BADGE";
        networkSpan.innerText = "RÉSEAU";
        exportSpan.innerText = "EXPORTER LES DONNÉES";
        verifySpan.innerText = "VÉRIFIER BÉNÉFICIAIRE";
        langSpan.innerText = "FRANÇAIS";
        devText.innerText = "Développé Par";
    } else {
        usernameField.placeholder = "USERNAME";
        passwordField.placeholder = "PASSWORD";
        loginBtn.innerText = "LOGIN";
        scanBtn.innerText = "SCAN BADGE";
        networkSpan.innerText = "NETWORK CHECK";
        exportSpan.innerText = "EXPORT CAMPAIGN LOGS";
        verifySpan.innerText = "VERIFY BENEFICIARY PRINT";
        langSpan.innerText = "ENGLISH";
        devText.innerText = "Developed By";
    }
}

// QR Scanner
function startScanner() {
    const modal = document.getElementById("scannerModal");
    modal.style.display = "flex";
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        qr => {
            alert("Scanned Badge: " + qr);
            // Optional: Auto-fill username with scanned value
            document.getElementById("username").value = qr;
            stopScanner();
        }
    ).catch(err => console.error("Scanner error", err));
}

function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            document.getElementById("scannerModal").style.display = "none";
        }).catch(() => {
            document.getElementById("scannerModal").style.display = "none";
        });
    } else {
        document.getElementById("scannerModal").style.display = "none";
    }
}

// Card click handlers
document.getElementById("networkCard").addEventListener("click", function() {
    alert("Network Status: Connected\nSignal Strength: Good\nServer: Online");
});

document.getElementById("exportCard").addEventListener("click", function() {
    alert("Export Campaign Logs\nThis feature will export all campaign data to CSV format.");
});

document.getElementById("verifyCard").addEventListener("click", function() {
    alert("Verify Beneficiary\nPlease scan beneficiary fingerprint or enter ID to verify.");
});

// Load CSV when page loads
loadCSV();

// Add sample CSV data instruction in console
console.log("Login System Ready!");
console.log("Sample credentials: HHR2026 / 123455 -> redirects to mregistration.html");
console.log("Sample credentials: admin / 1234 -> redirects to mscreen.html");
console.log("To use your own credentials, create Keys.csv file with format: username,password,role,page");
</script>
</body>
</html>
