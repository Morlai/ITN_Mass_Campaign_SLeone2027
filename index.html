<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ICF-SL | ITN Campaign</title>

<!-- Font Awesome 6 (free icons) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  /* ----- RESET & GLOBAL ----- */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: #ffffff;  /* Changed to white background */
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    padding: 20px;
  }

  /* ----- PHONE FRAME ----- */
  .phone-frame {
    width: 390px;
    height: 760px;
    background: #1a1e2c;
    border-radius: 50px;
    padding: 12px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
  }

  /* Phone mock with Background.png INSIDE the phone shape */
  .phone-mock {
    width: 100%;
    height: 100%;
    background: url("Background.png") no-repeat center center;
    background-size: cover;
    border-radius: 40px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Semi-transparent overlay for readability inside phone */
  .phone-mock::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    border-radius: 40px;
    pointer-events: none;
  }

  /* ----- SCROLLABLE CONTENT (above overlay) ----- */
  .screen {
    flex: 1;
    padding: 20px 16px;
    overflow-y: auto;
    position: relative;
    z-index: 2;
  }

  /* ----- LOGIN CARD (semi-transparent white for better contrast) ----- */
  .card {
    background: rgba(255, 255, 255, 0.96);
    border-radius: 28px;
    padding: 24px 20px;
    text-align: center;
    margin-bottom: 28px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    backdrop-filter: blur(2px);
  }

  .logo-area img {
    width: 100px;
    margin-bottom: 16px;
  }

  /* form fields */
  .field {
    background: #f1f5f9;
    border-radius: 40px;
    padding: 12px 18px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.2s;
  }

  .field input {
    border: none;
    background: transparent;
    width: 100%;
    outline: none;
    font-size: 14px;
    font-weight: 500;
  }

  .eye {
    cursor: pointer;
    font-size: 18px;
    color: #5b6f8c;
    transition: 0.2s;
  }

  .eye:hover {
    color: #2a7fc4;
  }

  /* buttons */
  .btn {
    width: 100%;
    padding: 12px;
    border-radius: 40px;
    border: none;
    color: white;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn-login {
    background: #2a7fc4;
  }

  .btn-login:hover {
    background: #1e6aad;
    transform: scale(0.98);
  }

  .btn-scan {
    background: #2e8b4a;
  }

  .btn-scan:hover {
    background: #237a40;
    transform: scale(0.98);
  }

  /* ----- ACTION GRID (4 tiles) ----- */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 12px 0 8px;
  }

  .tile {
    border-radius: 20px;
    padding: 14px 8px;
    text-align: center;
    color: white;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    transition: transform 0.2s, filter 0.2s;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
  }

  .tile:hover {
    transform: translateY(-3px);
    filter: brightness(1.1);
  }

  .tile-icon {
    font-size: 24px;
    margin-bottom: 6px;
  }

  /* individual tile colors (solid with slight opacity) */
  .t-orange { background: rgba(217, 95, 26, 0.9); }
  .t-blue   { background: rgba(42, 127, 196, 0.9); }
  .t-purple { background: rgba(123, 63, 160, 0.9); }
  .t-teal   { background: rgba(27, 154, 138, 0.9); }

  /* ----- FOOTER (solid blue bar) ----- */
  .footer {
    background: #1565C0;
    text-align: center;
    padding: 12px 10px;
    color: white;
    font-size: 11px;
    line-height: 1.4;
    position: relative;
    z-index: 2;
  }

  /* ----- MESSAGE TOAST (error/success) ----- */
  .message {
    font-size: 12px;
    margin-bottom: 14px;
    padding: 8px 12px;
    border-radius: 30px;
    display: none;
    font-weight: 500;
  }

  .error {
    background: #fee2e2;
    color: #b91c1c;
    border-left: 4px solid #dc2626;
  }

  .success {
    background: #dcfce7;
    color: #15803d;
    border-left: 4px solid #16a34a;
  }

  /* scrollbar styling */
  .screen::-webkit-scrollbar {
    width: 3px;
  }
  .screen::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
  }
  .screen::-webkit-scrollbar-thumb {
    background: #1565C0;
    border-radius: 10px;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="phone-mock">
    <div class="screen">

      <!-- LOGIN CARD -->
      <div class="card">
        <div class="logo-area">
          <!-- ICF-SL Logo.png (local image file) -->
          <img src="ICF-SL Logo.png" alt="ICF-SL Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' rx=\'20\' fill=\'white\'/%3E%3Ccircle cx=\'50\' cy=\'48\' r=\'34\' fill=\'%231565C0\'/%3E%3Ctext x=\'50\' y=\'63\' text-anchor=\'middle\' fill=\'white\' font-size=\'28\' font-weight=\'800\' font-family=\'Arial\'%3EICF%3C/text%3E%3Ctext x=\'50\' y=\'78\' text-anchor=\'middle\' fill=\'%231565C0\' font-size=\'10\' font-weight=\'bold\' font-family=\'Arial\'%3ESL%3C/text%3E%3C/svg%3E'">
        </div>

        <!-- dynamic message (error / success) -->
        <div id="msg" class="message"></div>

        <div class="field">
          <input type="text" id="username" placeholder="USERNAME" autocomplete="off">
        </div>

        <div class="field">
          <input type="password" id="password" placeholder="PASSWORD" autocomplete="off">
          <span class="eye" onclick="togglePasswordVisibility()">
            <i class="fa-regular fa-eye" id="eyeIcon"></i>
          </span>
        </div>

        <button class="btn btn-login" id="loginBtn">LOGIN</button>
        <button class="btn btn-scan" id="scanQrBtn">SCAN QR</button>
      </div>

      <!-- 4 ACTION TILES -->
      <div class="grid">
        <div class="tile t-orange" id="networkTile">
          <div class="tile-icon"><i class="fa fa-wifi"></i></div>
          NETWORK CHECK
        </div>
        <div class="tile t-blue" id="exportTile">
          <div class="tile-icon"><i class="fa fa-download"></i></div>
          EXPORT CAMPAIGN LOGS
        </div>
        <div class="tile t-purple" id="verifyTile">
          <div class="tile-icon"><i class="fa fa-fingerprint"></i></div>
          VERIFY BENEFICIARY PRINT
        </div>
        <div class="tile t-teal" id="languageTile">
          <div class="tile-icon"><i class="fa fa-globe"></i></div>
          LANGUAGE
        </div>
      </div>

    </div> <!-- end screen -->

    <!-- FOOTER -->
    <div class="footer">
      Developed By<br>
      Informatics Consultancy Firm-SL © 2026
    </div>
  </div> <!-- end phone-mock -->
</div> <!-- end phone-frame -->

<script>
  // ----- TOGGLE PASSWORD VISIBILITY -----
  const passwordInput = document.getElementById('password');
  const eyeIcon = document.getElementById('eyeIcon');

  function togglePasswordVisibility() {
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      eyeIcon.classList.remove('fa-eye');
      eyeIcon.classList.add('fa-eye-slash');
    } else {
      passwordInput.type = 'password';
      eyeIcon.classList.remove('fa-eye-slash');
      eyeIcon.classList.add('fa-eye');
    }
  }

  // ----- MESSAGE HELPER -----
  const msgDiv = document.getElementById('msg');
  function showMessage(text, type) {
    msgDiv.style.display = 'block';
    msgDiv.className = `message ${type}`;
    msgDiv.innerHTML = text;
    setTimeout(() => {
      if (msgDiv.style.display === 'block') {
        msgDiv.style.display = 'none';
      }
    }, 3000);
  }

  // ----- LOGIN VALIDATION (admin / 1234) -----
  function performLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    const validUsername = "admin";
    const validPassword = "1234";

    if (!username || !password) {
      showMessage("Please enter username and password", "error");
      return;
    }

    if (username === validUsername && password === validPassword) {
      showMessage("Login successful!", "success");
      setTimeout(() => {
        alert("Welcome to Dashboard");
      }, 500);
    } else {
      showMessage("Invalid username or password", "error");
    }
  }

  // ----- ACTION TILE BEHAVIOR -----
  function networkCheck() {
    alert("🌐 Network Check: Connected to ICF-SL server");
  }
  function exportLogs() {
    alert("📁 Export Campaign Logs: File ready for download");
  }
  function verifyBeneficiary() {
    alert("🖨️ Verify Beneficiary Print: Document ready");
  }
  function setLanguage() {
    alert("🌐 Language: English selected");
  }

  // ----- EVENT BINDINGS -----
  document.getElementById('loginBtn').addEventListener('click', performLogin);
  document.getElementById('scanQrBtn').addEventListener('click', () => {
    alert("📱 Scan QR / Badge feature coming soon");
  });

  document.getElementById('networkTile').addEventListener('click', networkCheck);
  document.getElementById('exportTile').addEventListener('click', exportLogs);
  document.getElementById('verifyTile').addEventListener('click', verifyBeneficiary);
  document.getElementById('languageTile').addEventListener('click', setLanguage);

  // Enter key support
  function handleEnter(e) {
    if (e.key === 'Enter') {
      performLogin();
    }
  }
  document.getElementById('username').addEventListener('keypress', handleEnter);
  document.getElementById('password').addEventListener('keypress', handleEnter);
</script>
</body>
</html>
