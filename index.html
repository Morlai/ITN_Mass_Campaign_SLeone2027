<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITNs Campaign Login</title>

<!-- ICON LIBRARY -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    width: 360px;
    height: 720px;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    position: relative;
}

/* Background */
.bg {
    position: absolute;
    inset: 0;
    background: url('background.png') no-repeat center center/cover;
}

.bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
}

/* Content */
.content {
    position: relative;
    z-index: 2;
    padding: 20px;
}

/* Login Card */
.login-card {
    background: rgba(255,255,255,0.92);
    border-radius: 10px;
    padding: 15px;
    margin-top: 40px;
}

.logo {
    text-align: center;
    font-size: 28px;
    color: #C0392B;
    margin-bottom: 10px;
}

.input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: 1px solid #ccc;
    outline: none;
}

/* Password wrapper */
.password-wrapper {
    position: relative;
}

.password-wrapper input {
    width: 100%;
    padding-right: 40px;
}

/* Eye icon */
.eye-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #555;
}

/* Buttons */
.btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* 🔵 Login now matches export color */
.login { background: #2E86C1; }

.scan { background: #1E8449; }

/* Cards Grid */
.cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-top: 25px;
}

/* Card */
.card {
    border-radius: 12px;
    padding: 18px 10px;
    text-align: center;
    color: white;
    font-size: 12px;
    font-weight: bold;
}

.card i {
    font-size: 26px;
    margin-bottom: 10px;
}

/* Colors */
.network { background: #D35400; }
.export { background: #2E86C1; }
.verify { background: #8E44AD; }
.language { background: #16A085; }

/* Curve */
.curve {
    position: absolute;
    bottom: 120px;
    width: 100%;
    height: 60px;
}

/* Footer */
.footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 120px;
    background: #1E8449;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
}

.footer h4 {
    font-size: 11px;
}

.footer p {
    font-size: 13px;
    text-decoration: underline;
    font-weight: bold;
}

</style>
</head>

<body>

<div class="container">

    <div class="bg"></div>

    <div class="content">

        <!-- LOGIN -->
        <div class="login-card">
            <div class="logo"><i class="fa-solid fa-circle-notch"></i></div>

            <input class="input" placeholder="USERNAME">

            <!-- PASSWORD WITH EYE -->
            <div class="password-wrapper">
                <input id="password" class="input" type="password" placeholder="PASSWORD">
                <i class="fa-solid fa-eye eye-icon" onclick="togglePassword()"></i>
            </div>

            <button class="btn login">LOGIN</button>
            <button class="btn scan">SCAN BADGE</button>
        </div>

        <!-- ACTION CARDS -->
        <div class="cards">

            <div class="card network">
                <i class="fa-solid fa-wifi"></i>
                NETWORK CHECK
            </div>

            <div class="card export">
                <i class="fa-solid fa-download"></i>
                EXPORT CAMPAIGN LOGS
            </div>

            <div class="card verify">
                <i class="fa-solid fa-fingerprint"></i>
                VERIFY BENEFICIARY PRINT
            </div>

            <div class="card language">
                <i class="fa-solid fa-language"></i>
                LANGUAGE
            </div>

        </div>

    </div>

    <!-- CURVE -->
    <svg class="curve" viewBox="0 0 500 100" preserveAspectRatio="none">
        <path d="
            M0,65
            C80,95 140,100 200,75
            C260,50 320,40 380,60
            C430,75 470,70 500,65
            L500,100
            L0,100
            Z"
            fill="#1E8449"/>
    </svg>

    <!-- FOOTER -->
    <div class="footer">
        <h4>Developed By</h4>
        <p>Informatic Consultancy Firm-SL@2026</p>
    </div>

</div>

<!-- SCRIPT -->
<script>
function togglePassword() {
    const password = document.getElementById("password");
    const icon = document.querySelector(".eye-icon");

    if (password.type === "password") {
        password.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        password.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>

</body>
</html>
