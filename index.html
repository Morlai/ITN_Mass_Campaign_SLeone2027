<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITNs Campaign Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- QR Scanner Library -->
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
/* (KEEP ALL YOUR ORIGINAL STYLES — unchanged) */

* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    width:360px;
    height:720px;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    position:relative;
}

.bg {
    position:absolute;
    inset:0;
    background:url('background.png') no-repeat center/cover;
}

.bg::after {
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
}

.content {
    position:relative;
    z-index:2;
    padding:20px;
}

.login-card {
    background:rgba(255,255,255,0.92);
    border-radius:10px;
    padding:15px;
    margin-top:40px;
}

.logo { text-align:center; margin-bottom:10px; }
.logo img { width:70px; }

.input {
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
}

.password-wrapper { position:relative; }
.password-wrapper input { padding-right:40px; }

.eye-icon {
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

.btn {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover { transform:scale(1.03); opacity:0.9; }

.login { background:#2E86C1; }
.scan { background:#1E8449; }

.cards {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
    margin-top:25px;
}

.card {
    border-radius:12px;
    padding:18px 10px;
    text-align:center;
    color:white;
    font-size:12px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.card:hover { transform:scale(1.05); }

.card i { font-size:26px; margin-bottom:10px; }

.network { background:#D35400; }
.export { background:#2E86C1; }
.verify { background:#8E44AD; }
.language { background:#16A085; }

.curve {
    position:absolute;
    bottom:120px;
    width:100%;
    height:60px;
}

.footer {
    position:absolute;
    bottom:0;
    width:100%;
    height:120px;
    background:#1E8449;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
}

.footer h4 { font-size:11px; }
.footer p { font-size:13px; text-decoration:underline; font-weight:bold; }

/* 📷 Scanner Modal */
#scannerModal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}

#reader {
    width:300px;
}

.close-btn {
    margin-top:15px;
    padding:10px 20px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="bg"></div>

    <div class="content">

        <div class="login-card">

            <div class="logo">
                <img src="ICF-SL Logo.jpg">
            </div>

            <input id="username" class="input" placeholder="USERNAME">

            <div class="password-wrapper">
                <input id="password" class="input" type="password" placeholder="PASSWORD">
                <i class="fa-solid fa-eye eye-icon" onclick="togglePassword()"></i>
            </div>

            <button id="loginBtn" class="btn login">LOGIN</button>
            <button id="scanBtn" class="btn scan" onclick="startScanner()">SCAN BADGE</button>

        </div>

        <div class="cards">
            <div class="card network" id="networkCard">
                <i class="fa-solid fa-wifi"></i>
                <span>NETWORK CHECK</span>
            </div>

            <div class="card export" id="exportCard">
                <i class="fa-solid fa-download"></i>
                <span>EXPORT CAMPAIGN LOGS</span>
            </div>

            <div class="card verify" id="verifyCard">
                <i class="fa-solid fa-fingerprint"></i>
                <span>VERIFY BENEFICIARY PRINT</span>
            </div>

            <div class="card language" onclick="toggleLanguage()">
                <i class="fa-solid fa-language"></i>
                <span id="langText">LANGUAGE</span>
            </div>
        </div>

    </div>

    <!-- CURVE -->
    <svg class="curve" viewBox="0 0 500 100" preserveAspectRatio="none">
        <path d="M0,65 C80,95 140,100 200,75 C260,50 320,40 380,60 C430,75 470,70 500,65 L500,100 L0,100 Z"
        fill="#1E8449"/>
    </svg>

    <!-- FOOTER -->
    <div class="footer">
        <h4 id="devText">Developed By</h4>
        <p>Informatic Consultancy Firm-SL@2026</p>
    </div>

</div>

<!-- 📷 SCANNER MODAL -->
<div id="scannerModal">
    <div id="reader"></div>
    <button class="close-btn" onclick="stopScanner()">Close</button>
</div>

<script>
let isEnglish = true;
let html5QrCode;

/* PASSWORD */
function togglePassword() {
    const password = document.getElementById("password");
    const icon = document.querySelector(".eye-icon");

    if (password.type === "password") {
        password.type = "text";
        icon.classList.replace("fa-eye","fa-eye-slash");
    } else {
        password.type = "password";
        icon.classList.replace("fa-eye-slash","fa-eye");
    }
}

/* 🌍 LANGUAGE */
function toggleLanguage() {
    isEnglish = !isEnglish;
}

/* 📷 START SCANNER */
function startScanner() {
    document.getElementById("scannerModal").style.display = "flex";

    html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        qrCodeMessage => {
            alert("Scanned: " + qrCodeMessage);
            stopScanner();
        }
    );
}

/* ❌ STOP SCANNER */
function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            document.getElementById("scannerModal").style.display = "none";
        });
    }
}
</script>

</body>
</html>
