<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ICF-SL | ITN Campaign Access Portal</title>

<!-- Font Awesome 6 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #eef2f9;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
    padding: 20px;
  }

  /* PHONE SHELL */
  .phone-frame {
    width: 390px;
    height: 760px;
    background: #1a1e2c;
    border-radius: 48px;
    padding: 10px;
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
  }

  .phone-mock {
    width: 100%;
    height: 100%;
    background: url("background.png") no-repeat center center;
    background-size: cover;
    border-radius: 40px;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .phone-mock::-webkit-scrollbar {
    display: none;
  }

  /* Login screen styles */
  .login-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px 18px 0 18px;
    position: relative;
    z-index: 2;
  }

  .card {
    background: rgba(255, 255, 255, 0.98);
    border-radius: 32px;
    padding: 28px 20px 26px;
    text-align: center;
    margin-bottom: 20px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
  }

  .logo-area img {
    width: 90px;
    margin-bottom: 14px;
    border-radius: 20px;
  }

  .field {
    background: #ffffff;
    border: 1.8px solid #2a7fc4;
    border-radius: 44px;
    padding: 12px 18px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .field:focus-within {
    border-color: #FF8C42;
    box-shadow: 0 0 0 3px rgba(255,140,66,0.2);
  }
  .field input {
    border: none;
    background: transparent;
    width: 100%;
    outline: none;
    font-size: 14px;
    font-weight: 600;
    color: #1e2f3f;
  }
  .field input::placeholder {
    color: #7a8e9e;
    font-weight: 500;
  }
  .eye {
    cursor: pointer;
    font-size: 18px;
    color: #2a7fc4;
  }

  .error-message, .success-message, .camera-error-msg {
    font-size: 12px;
    font-weight: 600;
    padding-left: 10px;
    margin-top: -6px;
    margin-bottom: 12px;
    display: none;
  }
  .error-message { color: #d32f2f; }
  .success-message { color: #2e7d32; }
  .camera-error-msg { color: #f97316; text-align: center; }
  .show { display: block; }

  .btn {
    width: 100%;
    padding: 12px;
    border-radius: 44px;
    border: none;
    color: white;
    font-weight: 800;
    font-size: 14px;
    margin-bottom: 12px;
    cursor: pointer;
  }
  .btn-login { background: #1565C0; }
  .btn-login:hover { background: #0e4f96; }
  .btn-scan { background: #2e7d64; }

  .utility-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .tile {
    border-radius: 24px;
    padding: 14px 6px;
    text-align: center;
    color: white;
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    background: rgba(0, 0, 0, 0.68);
    backdrop-filter: blur(6px);
  }
  .tile-icon { font-size: 24px; margin-bottom: 6px; }
  .t-orange { background: rgba(217, 95, 26, 0.88); }
  .t-blue   { background: rgba(42, 127, 196, 0.88); }
  .t-purple { background: rgba(123, 63, 160, 0.88); }
  .t-teal   { background: rgba(27, 154, 138, 0.88); }

  /* Login Footer */
  .login-footer {
    background: #1565C0;
    text-align: center;
    padding: 14px 12px;
    color: white;
    font-size: 10px;
    line-height: 1.4;
    width: calc(100% + 36px);
    margin-left: -18px;
    margin-right: 0;
    margin-top: auto;
    border-radius: 0;
  }
  .login-footer strong {
    color: #FFD966;
  }

  /* Dashboard Styles */
  .dashboard-container {
    display: flex;
    flex-direction: column;
    min-height: 100%;
  }

  .app-header {
    background-color: #1565C0;
    padding: 0.65rem 1rem 0.5rem;
    flex-shrink: 0;
  }
  .header-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.35rem;
  }
  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    gap: 0.5rem;
  }
  .logo-area-dash {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 44px;
    height: 44px;
    background: white;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .logo-icon img { width: 100%; object-fit: cover; }
  .org-info h1 {
    font-size: 0.75rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fff, #FFE0B5);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
  }
  .org-info p {
    font-size: 0.5rem;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.92);
  }
  .nav-badge {
    background: #FF8C42;
    padding: 0.3rem 1rem;
    border-radius: 40px;
    font-weight: 700;
    font-size: 0.55rem;
    display: flex;
    align-items: center;
    gap: 6px;
    color: white;
    white-space: nowrap;
    overflow-x: auto;
  }
  .campaign-sub-header {
    color: #FFDF8C;
    font-weight: 600;
    font-size: 0.6rem;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  /* USER INFO BAR */
  .user-info-bar {
    background: rgba(21, 101, 192, 0.95);
    backdrop-filter: blur(8px);
    padding: 10px 16px;
    margin: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: white;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    border-radius: 0;
  }
  .logout-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 5px 14px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    transition: 0.2s;
  }
  .logout-btn:hover {
    background: rgba(255,255,255,0.35);
  }

  .partner-section {
    background: white;
    padding: 0.6rem 0.5rem 0.5rem;
    border-bottom: 1px solid #eef2f8;
    flex-shrink: 0;
  }
  .partner-title {
    text-align: center;
    font-size: 0.55rem;
    font-weight: 800;
    color: #F57C00;
    margin-bottom: 0.5rem;
  }
  .partner-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.4rem;
  }
  .partner-item { text-align: center; }
  .partner-logo {
    background: #f9fbfd;
    border-radius: 12px;
    padding: 0.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #eef2fa;
    min-height: 32px;
  }
  .partner-logo img { max-width: 28px; max-height: 28px; }
  .partner-name { font-size: 0.44rem; font-weight: 700; color: #E65100; margin-top: 0.2rem; }

  /* SMART SLIDER - UPDATED COLORS */
  .carousel-section { 
    width: 100%; 
    background: transparent;
    margin: 0;
    padding: 0;
  }
  .carousel-container { 
    position: relative; 
    width: 100%; 
    overflow: hidden;
    background: #1565C0;
    border-radius: 0;
  }
  .carousel-slides { 
    display: flex; 
    transition: transform 0.5s ease-in-out;
  }
  .carousel-slide { 
    min-width: 100%; 
    flex-shrink: 0;
  }
  .carousel-slide img { 
    width: 100%;
    height: 200px;
    display: block;
    object-fit: cover;
    object-position: center;
  }
  .carousel-dots { 
    display: flex; 
    justify-content: center; 
    gap: 8px; 
    margin-top: 8px;
    margin-bottom: 8px;
    background: transparent;
    padding: 4px 0;
  }
  .dot { 
    width: 6px; 
    height: 6px; 
    border-radius: 50%; 
    background-color: #ffffff; 
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0.7;
  }
  .dot.active { 
    background-color: #FF8C42; 
    width: 20px; 
    border-radius: 4px;
    opacity: 1;
  }
  .carousel-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 32px;
    height: 32px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    font-weight: bold;
    color: #1565C0;
    transition: all 0.2s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    z-index: 10;
  }
  .carousel-arrow:hover {
    background: white;
    transform: translateY(-50%) scale(1.05);
  }
  .arrow-left { left: 10px; }
  .arrow-right { right: 10px; }

  /* ACTION CARDS - ORIGINAL DESIGN WITH FONT AWESOME ICONS */
  .role-actions-section { 
    padding: 0.5rem 0.8rem; 
    margin: 0.2rem 0.5rem;
    flex-shrink: 0;
  }
  .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
  .action-card {
    border-radius: 18px;
    padding: 0.45rem 0.2rem;
    text-align: center;
    cursor: pointer;
    transition: transform 0.12s ease;
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
  }
  .action-card:active { transform: scale(0.96); }
  .action-icon { font-size: 28px; margin-bottom: 6px; }
  .action-label { font-size: 0.52rem; font-weight: 800; margin-top: 0.35rem; }
  
  /* Card gradient backgrounds */
  .card-1 { background: linear-gradient(145deg, #FF6B6B, #EE5A24); color: white; }
  .card-2 { background: linear-gradient(145deg, #4ECDC4, #2c9e92); color: white; }
  .card-3 { background: linear-gradient(145deg, #45B7D1, #2980b9); color: white; }
  .card-4 { background: linear-gradient(145deg, #F9CA24, #F39C12); color: #2c3e50; }
  .card-5 { background: linear-gradient(145deg, #A55EEA, #8B5CF6); color: white; }
  .card-6 { background: linear-gradient(145deg, #FF9FF3, #F368E0); color: white; }
  .card-7 { background: linear-gradient(145deg, #1DD1A1, #0e9f6e); color: white; }
  .card-8 { background: linear-gradient(145deg, #FF8C42, #E67E22); color: white; }
  .card-9 { background: linear-gradient(145deg, #5D6D7E, #2C3E50); color: white; }
  
  .card-4 .action-label { color: #2c3e50; }
  .card-4 .action-icon { color: #2c3e50; }

  /* Dashboard Footer */
  .app-footer {
    background: #F8FAFE;
    margin-top: auto;
    flex-shrink: 0;
    width: 100%;
  }
  .wave-wrapper {
    line-height: 0;
    width: 100%;
  }
  .wave-svg {
    display: block;
    width: 100%;
    height: auto;
  }
  .footer-bottom {
    background: #1565C0;
    padding: 0.6rem 0.8rem;
    text-align: center;
    width: 100%;
  }
  .developed-by {
    font-size: 0.55rem;
    font-weight: 500;
    color: white;
    line-height: 1.4;
  }
  .developed-by strong {
    color: #FFD966;
    font-weight: 800;
  }

  /* Modals */
  .network-modal, .access-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 1100;
    justify-content: center;
    align-items: center;
  }
  .network-modal.active, .access-modal.active { display: flex; }
  .network-card, .access-card {
    background: white;
    border-radius: 36px;
    padding: 28px 22px;
    text-align: center;
    max-width: 310px;
    width: 85%;
  }
  .network-status-icon { font-size: 58px; margin-bottom: 12px; }
  .network-status-title { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
  .network-status-detail { font-size: 13px; color: #2c3e50; margin-bottom: 20px; line-height: 1.4; }
  .network-close-btn, .access-close-btn {
    background: #1565C0;
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="phone-mock" id="appContainer">
    <!-- Dynamic content injected here -->
  </div>
</div>

<!-- Network Modal -->
<div id="networkModal" class="network-modal">
  <div class="network-card">
    <div id="networkIcon" class="network-status-icon"></div>
    <div id="networkTitle" class="network-status-title"></div>
    <div id="networkDetail" class="network-status-detail"></div>
    <button class="network-close-btn" onclick="closeNetworkModal()">OK</button>
  </div>
</div>

<!-- Access Denied Modal -->
<div id="accessModal" class="access-modal">
  <div class="access-card">
    <div style="font-size: 48px; margin-bottom: 12px;">🔒</div>
    <div style="font-size: 20px; font-weight: 800; margin-bottom: 8px;">Access Restricted</div>
    <div id="accessModalMsg" style="font-size: 13px; color: #555; margin-bottom: 20px;"></div>
    <button class="access-close-btn" onclick="closeAccessModal()">OK</button>
  </div>
</div>

<script>
  // ====================== EMBEDDED CSV USER DATABASE ======================
  const csvData = `USERNAME,PASSWORD,REGISTER,DISTRIBUTION,MONITORING,STOCK,DASHBOARD,ATTENDANCE,DEVICE TRACKING,RECONCILIATION,WASTE MANAGEMENT
Admin,1234,Show,Show,Show,Show,Show,Show,Show,Show,Show
HHR2027,12345,Show,Hide,Hide,Hide,Hide,Hide,Hide,Hide,Hide
HHD2027,123456,Hide,Show,Hide,Hide,Hide,Hide,Hide,Hide,Hide
NATSUP2027,1234567,Hide,Hide,Show,Hide,Show,Show,Hide,Hide,Show
CHISUP2027,12345678,Hide,Hide,Hide,Hide,Hide,Show,Show,Hide,Hide
PHUSTAFF2027,123456789,Hide,Hide,Hide,Show,Hide,Hide,Hide,Show,Hide
PARTNERS2027,123,Hide,Hide,Hide,Hide,Show,Hide,Hide,Show,Show`;

  function parseCSV(csv) {
    const lines = csv.trim().split('\n');
    const headers = lines[0].split(',');
    const users = [];
    for (let i = 1; i < lines.length; i++) {
      const values = lines[i].split(',');
      let user = {};
      for (let j = 0; j < headers.length; j++) user[headers[j]] = values[j];
      users.push(user);
    }
    return users;
  }
  
  const usersDatabase = parseCSV(csvData);
  
  function findUser(username, password) {
    return usersDatabase.find(user => user.USERNAME === username && user.PASSWORD === password);
  }
  
  let currentUser = null;
  let currentPermissions = null;
  
  // ORIGINAL FONT AWESOME ICONS FOR EACH ACTION
  const roleActionMap = [
    { id: "REGISTER", label: "REGISTER", icon: "fa-id-card", color: "card-1", requires: "REGISTER" },
    { id: "DISTRIBUTION", label: "DISTRIBUTION", icon: "fa-boxes", color: "card-2", requires: "DISTRIBUTION" },
    { id: "MONITORING", label: "MONITORING", icon: "fa-chart-line", color: "card-3", requires: "MONITORING" },
    { id: "STOCK", label: "STOCK", icon: "fa-warehouse", color: "card-4", requires: "STOCK" },
    { id: "DASHBOARD", label: "DASHBOARD", icon: "fa-tachometer-alt", color: "card-5", requires: "DASHBOARD" },
    { id: "ATTENDANCE", label: "ATTENDANCE", icon: "fa-users", color: "card-6", requires: "ATTENDANCE" },
    { id: "DEVICE_TRACKING", label: "DEVICE TRACKING", icon: "fa-mobile-alt", color: "card-7", requires: "DEVICE_TRACKING" },
    { id: "RECONCILIATION", label: "RECONCILIATION", icon: "fa-balance-scale", color: "card-8", requires: "RECONCILIATION" },
    { id: "WASTE_MANAGEMENT", label: "WASTE MANAGEMENT", icon: "fa-recycle", color: "card-9", requires: "WASTE_MANAGEMENT" }
  ];
  
  function hasPermission(actionKey) {
    return currentPermissions && currentPermissions[actionKey] === "Show";
  }
  
  function showToast(msg) {
    const toast = document.createElement('div');
    toast.style.position = 'fixed';
    toast.style.bottom = '100px';
    toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)';
    toast.style.backgroundColor = '#2e7d32';
    toast.style.color = 'white';
    toast.style.padding = '10px 20px';
    toast.style.borderRadius = '40px';
    toast.style.fontSize = '12px';
    toast.style.fontWeight = 'bold';
    toast.style.zIndex = '2000';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }
  
  function showError(msg) {
    const errDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');
    if (successDiv) successDiv.classList.remove('show');
    errDiv.innerText = msg;
    errDiv.classList.add('show');
    setTimeout(() => errDiv.classList.remove('show'), 3000);
  }
  
  window.togglePasswordVisibility = function() {
    const pwd = document.getElementById('loginPassword');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.classList.remove('fa-eye');
      icon.classList.add('fa-eye-slash');
    } else {
      pwd.type = 'password';
      icon.classList.remove('fa-eye-slash');
      icon.classList.add('fa-eye');
    }
  };
  
  // NETWORK CHECK
  async function checkNetwork() {
    const tile = document.getElementById('networkTile');
    const originalHTML = tile.innerHTML;
    tile.innerHTML = `<div class="tile-icon"><i class="fa fa-spinner fa-pulse"></i></div>CHECKING...`;
    tile.style.opacity = '0.7';
    
    let isConnected = false;
    let connectionType = 'Unknown';
    let responseTime = null;
    const browserOnline = navigator.onLine;
    
    try {
      const startTime = Date.now();
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 8000);
      const response = await fetch('https://www.gstatic.com/generate_204', {
        method: 'HEAD',
        cache: 'no-cache',
        signal: controller.signal
      });
      clearTimeout(timeoutId);
      responseTime = Date.now() - startTime;
      if (response.ok || response.status === 204) isConnected = true;
      else isConnected = false;
    } catch (err) {
      try {
        const fallbackStart = Date.now();
        const fallbackResponse = await fetch('https://cloudflare.com/cdn-cgi/trace', {
          method: 'HEAD',
          cache: 'no-cache'
        });
        if (fallbackResponse.ok) {
          isConnected = true;
          responseTime = Date.now() - fallbackStart;
        }
      } catch (finalErr) { isConnected = false; }
    }
    
    if (navigator.connection) {
      connectionType = navigator.connection.effectiveType || navigator.connection.type || 'Unknown';
    }
    
    tile.innerHTML = originalHTML;
    tile.style.opacity = '1';
    
    const networkIcon = document.getElementById('networkIcon');
    const networkTitle = document.getElementById('networkTitle');
    const networkDetail = document.getElementById('networkDetail');
    
    if (isConnected) {
      networkIcon.innerHTML = '<i class="fa fa-check-circle" style="color: #10b981;"></i>';
      networkTitle.innerHTML = '✅ INTERNET CONNECTED';
      networkDetail.innerHTML = `
        Your device has active internet connectivity.<br><br>
        📡 Connection: ${connectionType}<br>
        ⏱️ Response: ${responseTime || 'Fast'} ms<br>
        🌐 Status: Online
      `;
    } else {
      networkIcon.innerHTML = '<i class="fa fa-wifi" style="color: #f97316;"></i>';
      networkTitle.innerHTML = '⚠️ NO INTERNET CONNECTION';
      networkDetail.innerHTML = `
        Unable to detect internet connectivity.<br><br>
        📱 Browser status: ${browserOnline ? 'Online (limited)' : 'Offline'}<br>
        💡 Tip: Check your Wi-Fi or mobile data
      `;
    }
    document.getElementById('networkModal').classList.add('active');
  }
  
  window.closeNetworkModal = () => document.getElementById('networkModal').classList.remove('active');
  window.closeAccessModal = () => document.getElementById('accessModal').classList.remove('active');
  
  function showAccessDenied(actionName) {
    document.getElementById('accessModalMsg').innerHTML = `You don't have permission to access <strong>${actionName}</strong>.`;
    document.getElementById('accessModal').classList.add('active');
  }
  
  async function startCamera() {
    showToast('📷 Camera simulation: Badge scanned successfully');
    const mockBadges = ["ICF-BADGE-001", "NMCP-ITN-8743", "MOH-SL-5562"];
    const scanned = mockBadges[Math.floor(Math.random() * mockBadges.length)];
    showToast(`✓ Badge verified: ${scanned}`);
  }
  
  let currentLang = 'en';
  function toggleLanguage() {
    currentLang = currentLang === 'en' ? 'fr' : 'en';
    const placeholders = currentLang === 'en' ? ['USERNAME', 'PASSWORD'] : ['NOM D\'UTILISATEUR', 'MOT DE PASSE'];
    const userField = document.getElementById('loginUsername');
    const passField = document.getElementById('loginPassword');
    if (userField) userField.placeholder = placeholders[0];
    if (passField) passField.placeholder = placeholders[1];
    const loginBtn = document.getElementById('loginBtn');
    if (loginBtn) loginBtn.innerText = currentLang === 'en' ? 'LOGIN' : 'CONNEXION';
    const scanBtn = document.getElementById('scanQrBtn');
    if (scanBtn) scanBtn.innerText = currentLang === 'en' ? 'SCAN QR BADGE' : 'SCANNER QR';
  }
  
  // RENDER LOGIN SCREEN
  function renderLoginScreen() {
    const container = document.getElementById('appContainer');
    container.innerHTML = `
      <div class="login-screen">
        <div class="card">
          <div class="logo-area">

  async function performLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    if (!username || !password) {
      showError('⚠ Please enter username and password');
      return;
    }
    const user = findUser(username, password);
    if (user) {
      storeAndLogin(user);
      renderDashboard();
    } else {
      showError('✗ Invalid username or password');
    }
  }
  
  function storeAndLogin(user) {
    currentUser = user;
    currentPermissions = {
      username: user.USERNAME,
      REGISTER: user.REGISTER, DISTRIBUTION: user.DISTRIBUTION, MONITORING: user.MONITORING,
      STOCK: user.STOCK, DASHBOARD: user.DASHBOARD, ATTENDANCE: user.ATTENDANCE,
      DEVICE_TRACKING: user["DEVICE TRACKING"], RECONCILIATION: user.RECONCILIATION,
      WASTE_MANAGEMENT: user["WASTE MANAGEMENT"]
    };
    sessionStorage.setItem('userPermissions', JSON.stringify(currentPermissions));
    sessionStorage.setItem('loggedInUser', user.USERNAME);
  }
  
  function logout() {
    currentUser = null;
    currentPermissions = null;
    sessionStorage.removeItem('userPermissions');
    sessionStorage.removeItem('loggedInUser');
    renderLoginScreen();
  }
  
  // Initialize carousel function
  function initCarousel() {
    const slidesContainer = document.getElementById('carouselSlides');
    const dotsContainer = document.getElementById('carouselDots');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    if (!slidesContainer) return;
    
    const slides = document.querySelectorAll('.carousel-slide');
    if (slides.length === 0) return;
    
    let currentIndex = 0;
    let autoInterval;
    
    function createDots() {
      if (!dotsContainer) return;
      dotsContainer.innerHTML = '';
      slides.forEach((_, idx) => {
        const dot = document.createElement('div');
        dot.classList.add('dot');
        if (idx === currentIndex) dot.classList.add('active');
        dot.addEventListener('click', () => goToSlide(idx));
        dotsContainer.appendChild(dot);
      });
    }
    
    function updateDots() {
      const dots = document.querySelectorAll('.dot');
      dots.forEach((dot, idx) => {
        if (idx === currentIndex) dot.classList.add('active');
        else dot.classList.remove('active');
      });
    }
    
    function goToSlide(index) {
      if (index < 0) index = slides.length - 1;
      if (index >= slides.length) index = 0;
      currentIndex = index;
      slidesContainer.style.transform = `translateX(-${currentIndex * 100}%)`;
      updateDots();
      resetAutoSlide();
    }
    
    function nextSlide() { goToSlide(currentIndex + 1); }
    function prevSlide() { goToSlide(currentIndex - 1); }
    
    function resetAutoSlide() {
      if (autoInterval) clearInterval(autoInterval);
      autoInterval = setInterval(() => { nextSlide(); }, 5000);
    }
    
    if (prevBtn) prevBtn.addEventListener('click', prevSlide);
    if (nextBtn) nextBtn.addEventListener('click', nextSlide);
    createDots();
    resetAutoSlide();
    
    const container = document.querySelector('.carousel-container');
    if (container) {
      container.addEventListener('mouseenter', () => clearInterval(autoInterval));
      container.addEventListener('mouseleave', resetAutoSlide);
    }
  }
