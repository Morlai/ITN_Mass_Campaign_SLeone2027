<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ICF-SL | ITN Campaign Access Portal</title>

<!-- Font Awesome 6 (free icons) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: #eef2f9;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
    padding: 20px;
  }

  /* MODERN PHONE SHELL */
  .phone-frame {
    width: 390px;
    height: 760px;
    background: #1a1e2c;
    border-radius: 48px;
    padding: 10px;
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
  }

  .phone-mock {
    width: 100%;
    height: 100%;
    background: url("background.png") no-repeat center center;
    background-size: cover;
    border-radius: 40px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Subtle overlay for better readability */
  .phone-mock::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.38);
    border-radius: 40px;
    pointer-events: none;
    z-index: 1;
  }

  /* scrollable content area */
  .screen {
    flex: 1;
    padding: 24px 18px 18px;
    overflow-y: auto;
    position: relative;
    z-index: 2;
  }

  /* Login card */
  .card {
    background: rgba(255, 255, 255, 0.98);
    border-radius: 32px;
    padding: 28px 20px 26px;
    text-align: center;
    margin-bottom: 28px;
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
    backdrop-filter: blur(2px);
  }

  .logo-area img {
    width: 90px;
    margin-bottom: 14px;
    border-radius: 20px;
    box-shadow: 0 5px 12px rgba(0,0,0,0.1);
  }

  /* Input fields */
  .field {
    background: #ffffff;
    border: 1.8px solid #2a7fc4;
    border-radius: 44px;
    padding: 12px 18px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: 0.2s;
  }
  .field:focus-within {
    border-color: #FF8C42;
    box-shadow: 0 0 0 3px rgba(255,140,66,0.2);
  }
  .field input {
    border: none;
    background: transparent;
    width: 100%;
    outline: none;
    font-size: 14px;
    font-weight: 600;
    color: #1e2f3f;
  }
  .field input::placeholder {
    color: #7a8e9e;
    font-weight: 500;
  }
  .eye {
    cursor: pointer;
    font-size: 18px;
    color: #2a7fc4;
    transition: 0.2s;
  }
  .eye:hover { color: #FF8C42; }

  /* Messages */
  .error-message, .success-message, .camera-error-msg {
    font-size: 12px;
    font-weight: 600;
    padding-left: 10px;
    margin-top: -6px;
    margin-bottom: 12px;
    display: none;
  }
  .error-message { color: #d32f2f; }
  .success-message { color: #2e7d32; }
  .camera-error-msg { color: #f97316; text-align: center; margin-top: 8px; }

  .show { display: block; }

  /* Buttons */
  .btn {
    width: 100%;
    padding: 12px;
    border-radius: 44px;
    border: none;
    color: white;
    font-weight: 800;
    font-size: 14px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: 0.2s;
  }
  .btn-login { background: #1565C0; box-shadow: 0 4px 10px rgba(21,101,192,0.3); }
  .btn-login:hover { background: #0e4f96; transform: scale(0.98); }
  .btn-scan { background: #2e7d64; box-shadow: 0 4px 10px rgba(46,125,100,0.3); }
  .btn-scan:hover { background: #236b55; transform: scale(0.98); }

  /* Action Grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 10px 0 8px;
  }
  .tile {
    border-radius: 24px;
    padding: 16px 6px;
    text-align: center;
    color: white;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    background: rgba(0, 0, 0, 0.68);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .tile:hover { transform: translateY(-3px); filter: brightness(1.08); background: rgba(0, 0, 0, 0.8);}
  .tile-icon { font-size: 26px; margin-bottom: 8px; }
  .t-orange { background: rgba(217, 95, 26, 0.88); }
  .t-blue   { background: rgba(42, 127, 196, 0.88); }
  .t-purple { background: rgba(123, 63, 160, 0.88); }
  .t-teal   { background: rgba(27, 154, 138, 0.88); }

  /* Footer */
  .footer {
    background: #0f3d6b;
    text-align: center;
    padding: 12px 8px;
    color: white;
    font-size: 10px;
    line-height: 1.4;
    position: relative;
    z-index: 2;
    font-weight: 500;
  }

  /* Modals */
  .network-modal, .camera-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 1100;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  .network-modal.active, .camera-modal.active { display: flex; }
  .network-card {
    background: white;
    border-radius: 36px;
    padding: 28px 22px;
    text-align: center;
    max-width: 310px;
    width: 85%;
    box-shadow: 0 30px 40px rgba(0,0,0,0.3);
  }
  .network-status-icon { font-size: 58px; margin-bottom: 12px; }
  .network-status-title { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
  .network-status-detail { font-size: 13px; color: #2c3e50; margin-bottom: 20px; line-height: 1.4; }
  .network-close-btn, .camera-btn {
    background: #1565C0;
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 40px;
    font-weight: bold;
    cursor: pointer;
  }
  .camera-video {
    width: 90%;
    max-width: 340px;
    border-radius: 28px;
    border: 3px solid white;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }
  .camera-controls { margin-top: 20px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
  .camera-btn-close { background: #b91c1c; }
  .camera-btn-capture { background: #2b9348; }
  .scan-result {
    margin-top: 18px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 10px 18px;
    border-radius: 40px;
    font-size: 13px;
    text-align: center;
    max-width: 85%;
  }
  .screen::-webkit-scrollbar { width: 3px; }
  .screen::-webkit-scrollbar-track { background: rgba(255,255,255,0.2); border-radius: 10px; }
  .screen::-webkit-scrollbar-thumb { background: #FF8C42; border-radius: 10px; }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="phone-mock">
    <div class="screen">

      <!-- LOGIN SECTION -->
      <div class="card">
        <div class="logo-area">
          <img src="ICF-SL Logo.jpg" alt="ICF-SL Logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Crect width=\'100\' height=\'100\' rx=\'20\' fill=\'white\'/%3E%3Ccircle cx=\'50\' cy=\'48\' r=\'34\' fill=\'%231565C0\'/%3E%3Ctext x=\'50\' y=\'63\' text-anchor=\'middle\' fill=\'white\' font-size=\'28\' font-weight=\'800\'%3EICF%3C/text%3E%3Ctext x=\'50\' y=\'78\' text-anchor=\'middle\' fill=\'%231565C0\' font-size=\'10\' font-weight=\'bold\'%3ESL%3C/text%3E%3C/svg%3E'">
        </div>

        <div class="field">
          <input type="text" id="username" placeholder="USERNAME" autocomplete="off">
        </div>
        <div id="errorMsg" class="error-message"></div>
        <div id="successMsg" class="success-message"></div>

        <div class="field">
          <input type="password" id="password" placeholder="PASSWORD" autocomplete="off">
          <span class="eye" onclick="togglePasswordVisibility()">
            <i class="fa-regular fa-eye" id="eyeIcon"></i>
          </span>
        </div>

        <button class="btn btn-login" id="loginBtn">LOGIN</button>
        <button class="btn btn-scan" id="scanQrBtn">SCAN QR BADGE</button>
        <div id="cameraErrorMsg" class="camera-error-msg"></div>
      </div>

      <!-- UTILITY GRID -->
      <div class="grid">
        <div class="tile t-orange" id="networkTile">
          <div class="tile-icon"><i class="fa fa-signal"></i></div>
          <span>NETWORK CHECK</span>
        </div>
        <div class="tile t-blue" id="exportTile">
          <div class="tile-icon"><i class="fa fa-file-export"></i></div>
          <span>EXPORT LOGS</span>
        </div>
        <div class="tile t-purple" id="verifyTile">
          <div class="tile-icon"><i class="fa fa-print"></i></div>
          <span>VERIFY PRINT</span>
        </div>
        <div class="tile t-teal" id="languageTile">
          <div class="tile-icon"><i class="fa fa-language"></i></div>
          <span>LANGUAGE</span>
        </div>
      </div>

    </div>

    <div class="footer">
      <span id="footerText">Developed By<br>Informatics Consultancy Firm-SL © 2026</span>
    </div>
  </div>
</div>

<!-- Network Modal -->
<div id="networkModal" class="network-modal">
  <div class="network-card">
    <div id="networkIcon" class="network-status-icon"></div>
    <div id="networkTitle" class="network-status-title"></div>
    <div id="networkDetail" class="network-status-detail"></div>
    <button class="network-close-btn" onclick="closeNetworkModal()">OK</button>
  </div>
</div>

<!-- Camera QR Modal -->
<div id="cameraModal" class="camera-modal">
  <video id="cameraVideo" class="camera-video" autoplay playsinline></video>
  <div class="camera-controls">
    <button class="camera-btn camera-btn-capture" id="captureBtn">📷 CAPTURE QR</button>
    <button class="camera-btn camera-btn-close" id="closeCameraBtn">CLOSE</button>
  </div>
  <div id="scanResult" class="scan-result"></div>
</div>

<script>
  // ====================== EMBEDDED CSV USER DATABASE (exactly as requested) ======================
  // Full CSV data with the exact columns and rows from the specification
  const csvData = `USERNAME,PASSWORD,REGISTER,DISTRIBUTION,MONITORING,STOCK,DASHBOARD,ATTENDANCE,DEVICE TRACKING,RECONCILIATION,WASTE MANAGEMENT
Admin,1234,Show,Show,Show,Show,Show,Show,Show,Show,Show
HHR2027,12345,Show,Hide,Hide,Hide,Hide,Hide,Hide,Hide,Hide
HHD2027,123456,Hide,Show,Hide,Hide,Hide,Hide,Hide,Hide,Hide
NATSUP2027,1234567,Hide,Hide,Show,Hide,Show,Show,Hide,Hide,Show
CHISUP2027,12345678,Hide,Hide,Hide,Hide,Hide,Show,Show,Hide,Hide
PHUSTAFF2027,123456789,Hide,Hide,Hide,Show,Hide,Hide,Hide,Show,Hide
PARTNERS2027,123,Hide,Hide,Hide,Hide,Show,Hide,Hide,Show,Show`;

  // Parse CSV into array of user objects
  function parseCSV(csv) {
    const lines = csv.trim().split('\n');
    const headers = lines[0].split(',');
    const users = [];
    for (let i = 1; i < lines.length; i++) {
      const values = lines[i].split(',');
      let user = {};
      for (let j = 0; j < headers.length; j++) {
        user[headers[j]] = values[j];
      }
      users.push(user);
    }
    return users;
  }
  
  const usersDatabase = parseCSV(csvData);
  
  // Find user by username and password
  function findUser(username, password) {
    return usersDatabase.find(user => 
      user.USERNAME === username && user.PASSWORD === password
    );
  }
  
  // Store user permissions in sessionStorage for mscreen.html
  function storeUserPermissions(user) {
    const permissions = {
      username: user.USERNAME,
      REGISTER: user.REGISTER,
      DISTRIBUTION: user.DISTRIBUTION,
      MONITORING: user.MONITORING,
      STOCK: user.STOCK,
      DASHBOARD: user.DASHBOARD,
      ATTENDANCE: user.ATTENDANCE,
      DEVICE_TRACKING: user["DEVICE TRACKING"],
      RECONCILIATION: user.RECONCILIATION,
      WASTE_MANAGEMENT: user["WASTE MANAGEMENT"]
    };
    sessionStorage.setItem('userPermissions', JSON.stringify(permissions));
    sessionStorage.setItem('loggedInUser', user.USERNAME);
    // Also store raw user data for role display
    sessionStorage.setItem('userRole', user.USERNAME);
    return permissions;
  }

  // language state & translations
  let currentLang = 'en';
  const translations = {
    en: {
      userPlaceholder: "USERNAME", passPlaceholder: "PASSWORD", login: "LOGIN", scanBtn: "SCAN QR BADGE",
      network: "NETWORK CHECK", export: "EXPORT LOGS", verify: "VERIFY PRINT", lang: "LANGUAGE",
      footer: "Developed By<br>Informatics Consultancy Firm-SL © 2026",
      loginSuccess: "✓ Login successful! Redirecting to campaign hub...",
      loginError: "✗ Invalid username or password",
      enterCreds: "⚠ Please enter username and password",
      netConnected: "CONNECTED", netDisconnected: "OFFLINE MODE",
      netDetailConn: "Your device has active internet connectivity.", netDetailDis: "No internet access detected. Some features may be limited.",
      scanSuccess: "✓ Badge verified: ", cameraError: "❌ Camera access failed. Allow permissions.",
      exportMsg: "✓ Campaign logs exported successfully", verifyMsg: "✓ Beneficiary print document ready",
      checking: "CHECKING...", connType: "Connection", responseTime: "Latency", online: "Online", offline: "Offline"
    },
    fr: {
      userPlaceholder: "NOM D'UTILISATEUR", passPlaceholder: "MOT DE PASSE", login: "CONNEXION", scanBtn: "SCANNER QR",
      network: "VÉRIFICATION RÉSEAU", export: "EXPORTER LOGS", verify: "VÉRIFIER IMPRESSION", lang: "LANGUE",
      footer: "Développé par<br>Informatics Consultancy Firm-SL © 2026",
      loginSuccess: "✓ Connexion réussie ! Redirection...", loginError: "✗ Identifiants invalides",
      enterCreds: "⚠ Veuillez saisir nom d'utilisateur et mot de passe",
      netConnected: "CONNECTÉ", netDisconnected: "HORS LIGNE",
      netDetailConn: "Connectivité Internet active.", netDetailDis: "Aucune connexion Internet détectée.",
      scanSuccess: "✓ Badge scanné : ", cameraError: "❌ Impossible d'accéder à la caméra.",
      exportMsg: "✓ Journaux de campagne exportés", verifyMsg: "✓ Document d'impression bénéficiaire prêt",
      checking: "VÉRIFICATION...", connType: "Type", responseTime: "Temps réponse", online: "En ligne", offline: "Hors ligne"
    }
  };
  
  function t(key) { return translations[currentLang][key] || key; }
  function updateUI() {
    document.getElementById('username').placeholder = t('userPlaceholder');
    document.getElementById('password').placeholder = t('passPlaceholder');
    document.getElementById('loginBtn').innerText = t('login');
    document.getElementById('scanQrBtn').innerText = t('scanBtn');
    document.querySelector('#networkTile span').innerText = t('network');
    document.querySelector('#exportTile span').innerText = t('export');
    document.querySelector('#verifyTile span').innerText = t('verify');
    document.querySelector('#languageTile span').innerText = t('lang');
    document.getElementById('footerText').innerHTML = t('footer');
  }

  // UI helpers
  const errorDiv = document.getElementById('errorMsg');
  const successDiv = document.getElementById('successMsg');
  const cameraErrDiv = document.getElementById('cameraErrorMsg');
  function showError(msg) { successDiv.classList.remove('show'); errorDiv.innerText = msg; errorDiv.classList.add('show'); setTimeout(() => errorDiv.classList.remove('show'), 3800); }
  function showSuccess(msg) { errorDiv.classList.remove('show'); successDiv.innerText = msg; successDiv.classList.add('show'); setTimeout(() => successDiv.classList.remove('show'), 2800); }
  function showCameraErr(msg) { cameraErrDiv.innerText = msg; cameraErrDiv.classList.add('show'); setTimeout(() => cameraErrDiv.classList.remove('show'), 4000); }

  // toggle password visibility
  window.togglePasswordVisibility = function() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); }
    else { pwd.type = 'password'; icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); }
  };
  
  // ========== LOGIN with REDIRECT to mscreen.html (fully linked) ==========
  async function performLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    if (!username || !password) { showError(t('enterCreds')); return; }
    
    const user = findUser(username, password);
    if (user) {
      const permissions = storeUserPermissions(user);
      showSuccess(t('loginSuccess'));
      // Log access for debugging/audit
      console.log(`✅ [ACCESS GRANTED] User: ${username} | Time: ${new Date().toISOString()}`);
      console.log(`📋 Permissions:`, permissions);
      
      // REDIRECT TO mScreen DASHBOARD (mscreen.html) - fully linked
      setTimeout(() => {
        // Pass username as query parameter for additional verification if needed
        window.location.href = `mscreen.html?user=${encodeURIComponent(username)}&t=${Date.now()}`;
      }, 900);
    } else { 
      showError(t('loginError'));
      console.warn(`❌ [ACCESS DENIED] Failed login attempt for username: ${username}`);
    }
  }

  // NETWORK CHECK with real fetch
  const netModal = document.getElementById('networkModal');
  const netIcon = document.getElementById('networkIcon');
  const netTitle = document.getElementById('networkTitle');
  const netDetail = document.getElementById('networkDetail');
  window.closeNetworkModal = () => netModal.classList.remove('active');
  
  async function checkNetwork() {
    const tile = document.getElementById('networkTile');
    const originalHTML = tile.innerHTML;
    tile.innerHTML = `<div class="tile-icon"><i class="fa fa-spinner fa-pulse"></i></div>${t('checking')}`;
    tile.style.opacity = '0.7';
    let connected = false;
    let latency = null;
    try {
      const start = Date.now();
      const res = await fetch('https://www.google.com/generate_204', { method: 'HEAD', cache: 'no-cache' });
      latency = Date.now() - start;
      if (res.ok || res.status === 204) connected = true;
      else connected = false;
    } catch(e) {
      try {
        const fallback = await fetch('https://cloudflare.com/cdn-cgi/trace', { method: 'HEAD' });
        if (fallback.ok) connected = true;
        else connected = false;
      } catch(e2) { connected = false; }
    }
    tile.innerHTML = originalHTML;
    tile.style.opacity = '1';
    if (connected) {
      netIcon.innerHTML = '<i class="fa fa-check-circle" style="color:#10b981;"></i>';
      netTitle.innerText = `✅ ${t('netConnected')}`;
      const connType = navigator.connection?.effectiveType || '4G';
      netDetail.innerHTML = `${t('netDetailConn')}<br><br>📡 ${t('connType')}: ${connType}<br>⏱️ ${t('responseTime')}: ${latency || '~70'} ms<br>🌐 ${t('online')}`;
    } else {
      netIcon.innerHTML = '<i class="fa fa-wifi" style="color:#f97316;"></i>';
      netTitle.innerText = `⚠️ ${t('netDisconnected')}`;
      netDetail.innerHTML = `${t('netDetailDis')}<br><br>📱 ${t('offline')} mode active.`;
    }
    netModal.classList.add('active');
  }

  // ========== QR CAMERA (mock scanning with realistic simulation) ==========
  const cameraModal = document.getElementById('cameraModal');
  const video = document.getElementById('cameraVideo');
  let mediaStream = null;
  
  async function startCamera() {
    try {
      if (mediaStream) stopCameraTracks();
      mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      video.srcObject = mediaStream;
      await video.play();
      cameraModal.classList.add('active');
      document.getElementById('scanResult').innerHTML = '';
      cameraErrDiv.classList.remove('show');
    } catch(err) {
      console.error(err);
      showCameraErr(t('cameraError'));
    }
  }
  
  function stopCameraTracks() {
    if (mediaStream) {
      mediaStream.getTracks().forEach(track => track.stop());
      mediaStream = null;
    }
    video.srcObject = null;
  }
  
  function closeCamera() {
    stopCameraTracks();
    cameraModal.classList.remove('active');
  }
  
  // QR capture simulation - returns realistic badge IDs for campaign field agents
  function captureQR() {
    if (!mediaStream) return;
    const mockBadges = ["ICF-BADGE-2027-001", "NMCP-ITN-8743", "MOH-SL-5562", "PMI-EVOLVE-998", "GLOBAL-FUND-4521", "HHR-ADMIN-77", "PARTNER-SL-2027"];
    const scannedValue = mockBadges[Math.floor(Math.random() * mockBadges.length)];
    const scanDiv = document.getElementById('scanResult');
    scanDiv.innerHTML = `<i class="fa fa-qrcode"></i> ${t('scanSuccess')} ${scannedValue}<br><span style="font-size:11px;">Access level: Field Agent</span>`;
    // store in hidden field for potential use
    let hiddenField = document.getElementById('scannedBadgeData');
    if (!hiddenField) { hiddenField = document.createElement('input'); hiddenField.type = 'hidden'; hiddenField.id = 'scannedBadgeData'; document.body.appendChild(hiddenField); }
    hiddenField.value = scannedValue;
    showSuccess(`${t('scanSuccess')}${scannedValue}`);
    setTimeout(() => closeCamera(), 1800);
  }
  
  // Export / Verify actions with feedback
  function exportLogs() { showSuccess(t('exportMsg')); }
  function verifyPrint() { showSuccess(t('verifyMsg')); }
  function toggleLanguage() { currentLang = currentLang === 'en' ? 'fr' : 'en'; updateUI(); }
  
  // Bind events
  document.getElementById('loginBtn').addEventListener('click', performLogin);
  document.getElementById('scanQrBtn').addEventListener('click', startCamera);
  document.getElementById('closeCameraBtn').addEventListener('click', closeCamera);
  document.getElementById('captureBtn').addEventListener('click', captureQR);
  document.getElementById('networkTile').addEventListener('click', checkNetwork);
  document.getElementById('exportTile').addEventListener('click', exportLogs);
  document.getElementById('verifyTile').addEventListener('click', verifyPrint);
  document.getElementById('languageTile').addEventListener('click', toggleLanguage);
  document.getElementById('username').addEventListener('keypress', (e) => { if (e.key === 'Enter') performLogin(); });
  document.getElementById('password').addEventListener('keypress', (e) => { if (e.key === 'Enter') performLogin(); });
  
  // Initialize language UI
  updateUI();
  
  // Clear any previous session on page load for security (fresh login required)
  if (sessionStorage.getItem('loggedInUser')) {
    console.log("🧹 Clearing previous session for security");
    sessionStorage.removeItem('userPermissions');
    sessionStorage.removeItem('loggedInUser');
    sessionStorage.removeItem('userRole');
  }
  
  // Console log the embedded user database for verification
  console.log("✅ Embedded CSV User Database loaded successfully");
  console.log("📊 Available users:", usersDatabase.map(u => `${u.USERNAME} (${u.PASSWORD})`));
  console.log("🔗 Ready to redirect to mscreen.html upon successful login");
</script>
</body>
</html>
