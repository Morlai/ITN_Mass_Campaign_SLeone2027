<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ITN Campaign | ICF-SL</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

body {
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Phone container */
.container {
    width: 360px;
    max-width: 100%;
    height: 100vh;
    max-height: 780px;
    background: #fff;
    border-radius: 30px;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
}

/* Background image */
.bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('background.png') no-repeat center/cover;
    z-index: 0;
}
.bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
}

/* Main content */
.content {
    position: relative;
    z-index: 2;
    padding: 20px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.login-card {
    background: rgba(255,255,255,0.96);
    border-radius: 24px;
    padding: 20px 16px;
    margin-top: 20px;
    backdrop-filter: blur(2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.logo {
    text-align: center;
    margin-bottom: 16px;
}
.logo img {
    width: 65px;
    border-radius: 50%;
    background: white;
    padding: 4px;
}

.input {
    width: 100%;
    padding: 14px 12px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 40px;
    font-size: 16px;
    background: #fff;
}

.password-wrapper {
    position: relative;
}
.password-wrapper input {
    padding-right: 50px;
}
.eye-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #555;
    font-size: 1.2rem;
}

.btn {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 40px;
    color: white;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
}
.btn:hover {
    transform: scale(1.02);
    opacity: 0.9;
}
.login {
    background: #2E86C1;
}
.scan {
    background: #1E8449;
}

.cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 20px 0 10px 0;
}
.card {
    border-radius: 20px;
    padding: 14px 6px;
    text-align: center;
    color: white;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}
.card:hover {
    transform: scale(1.02);
}
.card i {
    font-size: 26px;
}
.network { background: #D35400; }
.export { background: #2E86C1; }
.verify { background: #8E44AD; }
.language { background: #16A085; }

/* Curve and footer */
.curve-wrapper {
    position: relative;
    z-index: 2;
    margin-top: auto;
}
.curve {
    width: 100%;
    height: 50px;
    display: block;
}
.footer {
    background: #1E8449;
    padding: 12px 16px 20px;
    text-align: center;
    color: white;
    border-radius: 20px 20px 0 0;
}
.footer h4 {
    font-size: 11px;
    font-weight: normal;
}
.footer p {
    font-size: 13px;
    text-decoration: underline;
    font-weight: bold;
    margin-top: 4px;
}

/* Scanner modal */
#scannerModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
    flex-direction: column;
}
#reader {
    width: 280px;
    border-radius: 20px;
    overflow: hidden;
}
.close-btn {
    margin-top: 20px;
    padding: 10px 24px;
    background: #e74c3c;
    color: white;
    border: none;
    border-radius: 40px;
    font-size: 1rem;
    cursor: pointer;
}

/* Mobile responsive */
@media (max-width: 380px) {
    .container {
        width: 100%;
        height: 100vh;
        border-radius: 0;
    }
    .login-card {
        padding: 16px 12px;
    }
    .cards {
        gap: 10px;
    }
    .card {
        padding: 10px 4px;
        font-size: 11px;
    }
    .card i {
        font-size: 22px;
    }
}

.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    color: white;
    font-size: 18px;
    gap: 12px;
    flex-direction: column;
}
</style>
</head>
<body>

    <div class="content">
        <div class="login-card">

</div>

<!-- QR SCANNER MODAL -->
<div id="scannerModal">
    <div id="reader"></div>
    <button class="close-btn" onclick="stopScanner()">Close</button>

<script>
// ============================================================
// ITN CAMPAIGN DASHBOARD - ROLE BASED ACCESS CONTROL
// Cards visibility based on user role loaded from Keys.csv
// ============================================================

let isEnglish = true;
let html5QrCode;
let userCredentials = [];

// Role configuration with which cards to HIDE in the main dashboard
// The dashboard (mscreen.html) will have these cards: REGISTER, DISTRIBUTION, MONITORING, STOCK, DASHBOARD, ATTENDANCE, DEVICE TRACKING, RECONCILIATION, WASTE MANAGEMENT
const ROLE_CONFIG = {
    ADMIN: {
        name: "ADMIN",
        visibleCards: ["REGISTER", "DISTRIBUTION", "MONITORING", "STOCK", "DASHBOARD", "ATTENDANCE", "DEVICE TRACKING", "RECONCILIATION", "WASTE MANAGEMENT"],
        hiddenCards: []
    },
    HHR: {
        name: "HHR",
        // HHR (Household Registration) should only see REGISTER, RECONCILIATION, WASTE MANAGEMENT? 
        // Based on requirement: Hide DISTRIBUTION, MONITORING, STOCK, DASHBOARD, ATTENDANCE, DEVICE TRACKING
        hiddenCards: ["DISTRIBUTION", "MONITORING", "STOCK", "DASHBOARD", "ATTENDANCE", "DEVICE TRACKING"]
    },
    HHD: {
        name: "HHD",
        // HHD (Household Distribution) should only see DISTRIBUTION, RECONCILIATION, WASTE MANAGEMENT
        hiddenCards: ["REGISTER", "MONITORING", "STOCK", "DASHBOARD", "ATTENDANCE", "DEVICE TRACKING"]
    },
    NATSUP: {
        name: "NATSUP",
        // National Supervisor: hide DISTRIBUTION, STOCK, ATTENDANCE, DEVICE TRACKING
        hiddenCards: ["DISTRIBUTION", "STOCK", "ATTENDANCE", "DEVICE TRACKING"]
    }
};

// Load credentials from Keys.csv
async function loadKeysFromCSV() {
    try {
        const response = await fetch("Keys.csv");
        if (!response.ok) throw new Error("Keys.csv not found");
        const data = await response.text();
        const rows = data.split(/\r?\n/);
        const credentials = [];
        
        for (let i = 0; i < rows.length; i++) {
            const line = rows[i].trim();
            if (line === "") continue;
            // Skip header if present
            if (i === 0 && (line.toLowerCase().includes("username") || line.toLowerCase().includes("password"))) continue;
            
            const parts = line.split(",");
            if (parts.length >= 2) {
                const username = parts[0].trim();
                const password = parts[1].trim();
                let role = parts.length >= 3 ? parts[2].trim().toUpperCase() : "";
                
                // Determine role based on username pattern if not specified
                if (!role) {
                    if (username === "Admin" || username === "admin") role = "ADMIN";
                    else if (username === "HHR2026") role = "HHR";
                    else if (username === "HHD2026") role = "HHD";
                    else if (username === "NATSUP2026") role = "NATSUP";
                    else role = "ADMIN";
                }
                
                if (username && password) {
                    credentials.push({ username, password, role });
                }
            }
        }
        
        if (credentials.length === 0) {
            // Fallback users
            credentials.push(
                { username: "Admin", password: "123", role: "ADMIN" },
                { username: "HHR2026", password: "123455", role: "HHR" },
                { username: "HHD2026", password: "123456", role: "HHD" },
                { username: "NATSUP2026", password: "123200", role: "NATSUP" }
            );
        }
        
        userCredentials = credentials;
        console.log("Credentials loaded:", userCredentials.map(c => ({user: c.username, role: c.role})));
        
    } catch (err) {
        console.warn("Error loading Keys.csv, using default users:", err);
        userCredentials = [
            { username: "Admin", password: "123", role: "ADMIN" },
            { username: "HHR2026", password: "123455", role: "HHR" },
            { username: "HHD2026", password: "123456", role: "HHD" },
            { username: "NATSUP2026", password: "123200", role: "NATSUP" }
        ];
    }
}

function authenticateUser(username, password) {
    const matched = userCredentials.find(cred => 
        cred.username === username && cred.password === password
    );
    if (matched) {
        return ROLE_CONFIG[matched.role] || ROLE_CONFIG.ADMIN;
    }
    return null;
}

// Create and inject dashboard dynamically with role-based visibility

    // Build the dashboard HTML

                        <div>

            </div>
            
            <!-- Cards Grid -->
            <div style="padding: 20px 16px; flex: 1;">
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;" id="dashboardCardsGrid">
                    <!-- Card: REGISTER -->
                    <div class="dash-card" data-card="REGISTER" style="background: linear-gradient(105deg, #1e3a8a, #3b82f6); border-radius: 24px; padding: 16px 12px; color: white; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center;">
                        <i class="fas fa-home" style="font-size: 28px; margin-bottom: 8px;"></i>
                        <span style="font-weight: 800; font-size: 14px;">REGISTER</span>
                        <span style="font-size: 9px; opacity: 0.85; margin-top: 4px;">(HHR)</span>
                    </div>
                    
                    <!-- Card: DISTRIBUTION -->
                    <div class="dash-card" data-card="DISTRIBUTION" style="background: linear-gradient(105deg, #0f5b2e, #2e9a5e); border-radius: 24px; padding: 16px 12px; color: white; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center;">
                        <i class="fas fa-users" style="font-size: 28px; margin-bottom: 8px;"></i>
                        <span style="font-weight: 800; font-size: 14px;">DISTRIBUTION</span>
                        <span style="font-size: 9px; opacity: 0.85; margin-top: 4px;">(HHD)</span>
                    </div>
                    
                    <!-- Card: MONITORING -->
                    <div class="dash-card" data-card="MONITORING" style="background: linear-gradient(105deg, #7c3aed, #a855f7); border-radius: 24px; padding: 16px 12px; color: white; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center;">
                        <i class="fas fa-chart-simple" style="font-size: 28px; margin-bottom: 8px;"></i>
                        <span style="font-weight: 800; font-size: 14px;">MONITORING</span>
                        <span style="font-size: 9px; opacity: 0.85; margin-top: 4px;">(Nat. Sup)</span>
                    </div>
                    
                    <!-- Card: STOCK -->
                    <div class="dash-card" data-card="STOCK" style="background: linear-gradient(105deg, #c2410c, #f97316); border-radius: 24px; padding: 16px 12px; color: white; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center;">
                        <i class="fas fa-box" style="font-size: 28px; margin-bottom: 8px;"></i>
                        <span style="font-weight: 800; font-size: 14px;">STOCK</span>
                    </div>
                    
                    <!-- Card: DASHBOARD -->
                    <div class="dash-card" data-card="DASHBOARD" style="background: linear-gradient(105deg, #0f5b7a, #14b8a6); border-radius: 24px; padding: 16px 12px; color: white; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center;">
                        <i class="fas fa-chart-line" style="font-size: 28px; margin-bottom: 8px;"></i>
                        <span style="font-weight: 800; font-size: 14px;">DASHBOARD</span>
                    </div>
                    
                    <!-- Card: ATTENDANCE -->
                    <div class="dash-card" data-card="ATTENDANCE" style="background: linear-gradient(105deg, #059669, #10b981); border-radius: 24px; padding: 16px 12px; color: white; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center;">
                        <i class="fas fa-calendar-check" style="font-size: 28px; margin-bottom: 8px;"></i>
                        <span style="font-weight: 800; font-size: 14px;">ATTENDANCE</span>
                    </div>
                    
                    <!-- Card: DEVICE TRACKING -->
                    <div class="dash-card" data-card="DEVICE TRACKING" style="background: linear-gradient(105deg, #dc2626, #ef4444); border-radius: 24px; padding: 16px 12px; color: white; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center;">
                        <i class="fas fa-mobile-alt" style="font-size: 28px; margin-bottom: 8px;"></i>
                        <span style="font-weight: 800; font-size: 14px;">DEVICE TRACKING</span>
                    </div>
                    
                    <!-- Card: RECONCILIATION -->
                    <div class="dash-card" data-card="RECONCILIATION" style="background: linear-gradient(105deg, #d97706, #f59e0b); border-radius: 24px; padding: 16px 12px; color: white; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center;">
                        <i class="fas fa-calculator" style="font-size: 28px; margin-bottom: 8px;"></i>
                        <span style="font-weight: 800; font-size: 14px;">RECONCILIATION</span>
                    </div>
                    
                    <!-- Card: WASTE MANAGEMENT -->
                    <div class="dash-card" data-card="WASTE MANAGEMENT" style="background: linear-gradient(105deg, #0891b2, #06b6d4); border-radius: 24px; padding: 16px 12px; color: white; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; text-align: center;">
                        <i class="fas fa-trash-alt" style="font-size: 28px; margin-bottom: 8px;"></i>

            </div>
            
            <!-- Footer -->
            <div style="background: linear-gradient(135deg, #0a4d9e 0%, #0b5ed7 100%); text-align: center; padding: 14px; border-radius: 24px 24px 0 0;">
                <div style="font-size: 10px; opacity: 0.9;">Developed by</div>

    container.innerHTML = dashboardHTML;
    container.style.borderRadius = "30px";
    container.style.height = "100vh";
    container.style.maxHeight = "100vh";
    container.style.overflowY = "auto";
    
    // Apply card visibility based on role
    const hiddenCardsSet = new Set(roleConfig.hiddenCards);
    const allCards = document.querySelectorAll('.dash-card');
    
    allCards.forEach(card => {
        const cardType = card.getAttribute('data-card');
        if (hiddenCardsSet.has(cardType)) {
            card.style.display = 'none';
        }
    });
    
    // Attach click handlers to visible cards
    document.querySelectorAll('.dash-card').forEach(card => {
        if (card.style.display !== 'none') {
            card.addEventListener('click', () => {
                const cardName = card.getAttribute('data-card');
                handleCardAction(cardName);
            });
        }
    });
    
    // Add logout button

    logoutBtn.style.right = '20px';

    logoutBtn.style.border = 'none';

    logoutBtn.style.fontWeight = 'bold';
    logoutBtn.style.fontSize = '12px';
    logoutBtn.style.cursor = 'pointer';

    logoutBtn.style.alignItems = 'center';

    logoutBtn.onclick = () => {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().catch(() => {});
        }
        location.reload();
    };
    container.style.position = 'relative';
    container.appendChild(logoutBtn);
    
    // Remove loading overlay
    if (loadingDiv) loadingDiv.remove();
}

// Handle card click actions
function handleCardAction(cardName) {
    const messages = {
        "REGISTER": "📝 REGISTER (HHR)\n\nHousehold Registration Module\n• Register new households\n• Capture demographic data\n• Generate household IDs",
        "DISTRIBUTION": "✅ DISTRIBUTION (HHD)\n\nHousehold Distribution Module\n• Record net distribution\n• Track quantities per household\n• Update distribution status",
        "MONITORING": "📊 MONITORING (Nat. Sup)\n\nSupervision & Monitoring Dashboard\n• Real-time supervision data\n• District performance metrics\n• Quality assurance tracking",
        "STOCK": "📦 STOCK Module\n\nInventory Management\n• Current stock levels\n• Reorder alerts\n• Warehouse distribution status",
        "DASHBOARD": "📊 DASHBOARD\n\nCampaign Analytics\n• Coverage by district\n• Performance metrics\n• Household registration trends",
        "ATTENDANCE": "📋 ATTENDANCE Module\n\nStaff Tracking\n• Daily check-ins\n• Training attendance\n• Supervision logs",
        "DEVICE TRACKING": "📍 DEVICE TRACKING\n\nField Device Monitoring\n• GPS location tracking\n• Device status\n• Field movement history",
        "RECONCILIATION": "🔄 RECONCILIATION Module\n\nData Verification\n• Match distribution vs registration\n• Identify discrepancies\n• Generate reconciliation reports",
        "WASTE MANAGEMENT": "♻️ WASTE MANAGEMENT Module\n\nDamaged Net Tracking\n• Record damaged nets\n• Disposal documentation\n• Waste reduction metrics"
    };
    
    const msg = messages[cardName] || `${cardName} Module\n\nAccess granted. Module dashboard will load.`;
    alert(msg);
}

// Login handler
async function handleLogin() {
    const usernameInput = document.getElementById("username").value.trim();
    const passwordInput = document.getElementById("password").value.trim();
    
    if (!usernameInput || !passwordInput) {
        alert(isEnglish ? "Please enter username and password" : "Veuillez entrer le nom d'utilisateur et le mot de passe");
        return;
    }
    
    if (userCredentials.length === 0) {
        await loadKeysFromCSV();
    }
    
    const roleConfig = authenticateUser(usernameInput, passwordInput);
    
    if (roleConfig) {
        loadDashboardWithRole(roleConfig, usernameInput);
    } else {
        alert(isEnglish ? "Invalid Username or Password" : "Nom d'utilisateur ou mot de passe incorrect");
    }
}

// Toggle password visibility
function togglePassword() {
    const password = document.getElementById("password");
    const icon = document.querySelector(".eye-icon");
    if (password.type === "password") {
        password.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        password.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}

// Language toggle
function toggleLanguage() {
    isEnglish = !isEnglish;
    const usernameField = document.getElementById("username");
    const passwordField = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const scanBtn = document.getElementById("scanBtn");
    const networkSpan = document.querySelector("#networkCard span");
    const exportSpan = document.querySelector("#exportCard span");
    const verifySpan = document.querySelector("#verifyCard span");
    const langSpan = document.getElementById("langText");
    const devText = document.getElementById("devText");

    if (!isEnglish) {
        usernameField.placeholder = "Nom d'utilisateur";
        passwordField.placeholder = "Mot de passe";
        loginBtn.innerText = "CONNEXION";
        scanBtn.innerText = "SCANNER BADGE";
        networkSpan.innerText = "RÉSEAU";
        exportSpan.innerText = "EXPORTER LES DONNÉES";
        verifySpan.innerText = "VÉRIFIER BÉNÉFICIAIRE";
        langSpan.innerText = "FRANÇAIS";
        devText.innerText = "Développé Par";
    } else {
        usernameField.placeholder = "USERNAME";
        passwordField.placeholder = "PASSWORD";
        loginBtn.innerText = "LOGIN";
        scanBtn.innerText = "SCAN BADGE";
        networkSpan.innerText = "NETWORK CHECK";
        exportSpan.innerText = "EXPORT CAMPAIGN LOGS";
        verifySpan.innerText = "VERIFY BENEFICIARY PRINT";
        langSpan.innerText = "ENGLISH";
        devText.innerText = "Developed By";
    }
}

// QR Scanner
function startScanner() {
    const modal = document.getElementById("scannerModal");
    modal.style.display = "flex";
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        qr => {
            alert(isEnglish ? "Scanned: " + qr : "Scanné: " + qr);
            stopScanner();
        }
    ).catch(err => console.error("Scanner error", err));
}

function stopScanner() {
    if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().then(() => {
            document.getElementById("scannerModal").style.display = "none";
        }).catch(() => {
            document.getElementById("scannerModal").style.display = "none";
        });
    } else {
        document.getElementById("scannerModal").style.display = "none";
    }
}

// Attach card event handlers for login page
function attachCardEvents() {
    document.getElementById("networkCard")?.addEventListener("click", () => {
        alert(isEnglish ? (navigator.onLine ? "✅ Network connected." : "❌ No internet connection") : (navigator.onLine ? "✅ Réseau connecté." : "❌ Pas de connexion internet"));
    });
    document.getElementById("exportCard")?.addEventListener("click", () => {
        alert(isEnglish ? "📁 Export Campaign Logs: Feature available after login to dashboard." : "📁 Exporter les journaux: Disponible après connexion.");
    });
    document.getElementById("verifyCard")?.addEventListener("click", () => {
        alert(isEnglish ? "🔍 Verify Beneficiary: Please login and use badge scanner." : "🔍 Vérifier bénéficiaire: Connectez-vous et utilisez le scanner.");
    });
}

// Initialize app
async function init() {
    await loadKeysFromCSV();
    attachCardEvents();
    
    const loginBtn = document.getElementById("loginBtn");
    const newLoginBtn = loginBtn.cloneNode(true);
    loginBtn.parentNode.replaceChild(newLoginBtn, loginBtn);
    newLoginBtn.addEventListener("click", handleLogin);
    
    const scanButton = document.getElementById("scanBtn");
    if (scanButton) {
        const newScanBtn = scanButton.cloneNode(true);
        scanButton.parentNode.replaceChild(newScanBtn, scanButton);
        newScanBtn.onclick = startScanner;
    }
    
    document.getElementById("password").addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleLogin();
    });
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
