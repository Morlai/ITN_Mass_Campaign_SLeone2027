<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ITNs Campaign Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

body {
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Phone container */
.container {
    width: 360px;
    max-width: 100%;
    height: 100vh;
    max-height: 780px;
    background: #fff;
    border-radius: 30px;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
}

/* Background image */
.bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('background.png') no-repeat center/cover;
    z-index: 0;
}
.bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
}

/* Main content */
.content {
    position: relative;
    z-index: 2;
    padding: 20px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.login-card {
    background: rgba(255,255,255,0.96);
    border-radius: 24px;
    padding: 20px 16px;
    margin-top: 20px;
    backdrop-filter: blur(2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.logo {
    text-align: center;
    margin-bottom: 16px;
}
.logo img {
    width: 65px;
    border-radius: 50%;
    background: white;
    padding: 4px;
}

.input {
    width: 100%;
    padding: 14px 12px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 40px;
    font-size: 16px;
    background: #fff;
}

.password-wrapper {
    position: relative;
}
.password-wrapper input {
    padding-right: 50px;
}
.eye-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #555;
    font-size: 1.2rem;
}

.btn {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 40px;
    color: white;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
}
.btn:hover {
    transform: scale(1.02);
    opacity: 0.9;
}
.login {
    background: #2E86C1;
}
.scan {
    background: #1E8449;
}

.cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 20px 0 10px 0;
}
.card {
    border-radius: 20px;
    padding: 14px 6px;
    text-align: center;
    color: white;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}
.card:hover {
    transform: scale(1.02);
}
.card i {
    font-size: 26px;
}
.network { background: #D35400; }
.export { background: #2E86C1; }
.verify { background: #8E44AD; }
.language { background: #16A085; }

/* Curve and footer */
.curve-wrapper {
    position: relative;
    z-index: 2;
    margin-top: auto;
}
.curve {
    width: 100%;
    height: 50px;
    display: block;
}
.footer {
    background: #1E8449;
    padding: 12px 16px 20px;
    text-align: center;
    color: white;
    border-radius: 20px 20px 0 0;
}
.footer h4 {
    font-size: 11px;
    font-weight: normal;
}
.footer p {
    font-size: 13px;
    text-decoration: underline;
    font-weight: bold;
    margin-top: 4px;
}

/* Scanner modal */
#scannerModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
    flex-direction: column;
}
#reader {
    width: 280px;
    border-radius: 20px;
    overflow: hidden;
}
.close-btn {
    margin-top: 20px;
    padding: 10px 24px;
    background: #e74c3c;
    color: white;
    border: none;
    border-radius: 40px;
    font-size: 1rem;
    cursor: pointer;
}

/* Mobile responsive */
@media (max-width: 380px) {
    .container {
        width: 100%;
        height: 100vh;
        border-radius: 0;
    }
    .login-card {
        padding: 16px 12px;
    }
    .cards {
        gap: 10px;
    }
    .card {
        padding: 10px 4px;
        font-size: 11px;
    }
    .card i {
        font-size: 22px;
    }
}

.hidden {
    display: none;
}

/* Loading indicator */
.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    color: white;
    font-size: 18px;
}
</style>
</head>
<body>

<div class="container" id="appContainer">
    <div class="bg"></div>
    <div class="content">
        <div class="login-card">
            <div class="logo">
                <img src="ICF-SL Logo.jpg" alt="ICF-SL Logo" onerror="this.src='https://placehold.co/200x200/2E86C1/white?text=ICF-SL'">
            </div>
            <input id="username" class="input" placeholder="USERNAME" autocomplete="off">
            <div class="password-wrapper">
                <input id="password" class="input" type="password" placeholder="PASSWORD">
                <i class="fa-solid fa-eye eye-icon" onclick="togglePassword()"></i>
            </div>
            <button id="loginBtn" class="btn login">LOGIN</button>
            <button id="scanBtn" class="btn scan" onclick="startScanner()">SCAN BADGE</button>
        </div>

        <div class="cards">
            <div class="card network" id="networkCard">
                <i class="fa-solid fa-wifi"></i>
                <span>NETWORK CHECK</span>
            </div>
            <div class="card export" id="exportCard">
                <i class="fa-solid fa-download"></i>
                <span>EXPORT CAMPAIGN LOGS</span>
            </div>
            <div class="card verify" id="verifyCard">
                <i class="fa-solid fa-fingerprint"></i>
                <span>VERIFY BENEFICIARY PRINT</span>
            </div>
            <div class="card language" onclick="toggleLanguage()">
                <i class="fa-solid fa-language"></i>
                <span id="langText">ENGLISH</span>
            </div>
        </div>
    </div>

    <!-- Curve + Footer -->
    <div class="curve-wrapper">
        <svg class="curve" viewBox="0 0 500 100" preserveAspectRatio="none">
            <path d="M0,65 C80,95 140,100 200,75 C260,50 320,40 380,60 C430,75 470,70 500,65 L500,100 L0,100 Z" fill="#1E8449"/>
        </svg>
        <div class="footer">
            <h4 id="devText">Developed By</h4>
            <p>Informatic Consultancy Firm-SL ©2026</p>
        </div>
    </div>
</div>

<!-- QR SCANNER MODAL -->
<div id="scannerModal">
    <div id="reader"></div>
    <button class="close-btn" onclick="stopScanner()">Close</button>
</div>

<script>
// ============================================================
// ROLE-BASED CARD VISIBILITY CONFIGURATION for mscreen.html
// Cards to hide per role: DISTRIBUTION, MONITORING, STOCK, DASHBOARD, ATTENDANCE, DEVICE TRACKING
// ============================================================

let isEnglish = true;
let html5QrCode;
let userCredentials = [];

// Role definitions with which cards to HIDE in mscreen.html
// All cards visible by default for ADMIN
const ROLE_CONFIG = {
    ADMIN: {
        name: "ADMIN",
        // ADMIN sees ALL cards - nothing hidden
        hiddenCards: []
    },
    HHR: {
        name: "HHR",
        // Hide: DISTRIBUTION, MONITORING, STOCK, DASHBOARD, ATTENDANCE, DEVICE TRACKING
        hiddenCards: ["DISTRIBUTION", "MONITORING", "STOCK", "DASHBOARD", "ATTENDANCE", "DEVICE TRACKING"]
    },
    HHD: {
        name: "HHD",
        // Hide: REGISTER, MONITORING, STOCK, DASHBOARD, ATTENDANCE, DEVICE TRACKING
        hiddenCards: ["REGISTER", "MONITORING", "STOCK", "DASHBOARD", "ATTENDANCE", "DEVICE TRACKING"]
    },
    NATSUP: {
        name: "NATSUP",
        // Hide: DISTRIBUTION, STOCK, ATTENDANCE, DEVICE TRACKING
        hiddenCards: ["DISTRIBUTION", "STOCK", "ATTENDANCE", "DEVICE TRACKING"]
    }
};

// Mapping from username/password to role (loaded from Keys.csv)
async function loadKeysFromCSV() {
    try {
        const response = await fetch("Keys.csv");
        if (!response.ok) throw new Error("Keys.csv not found");
        const data = await response.text();
        const rows = data.split(/\r?\n/);
        const credentials = [];
        
        for (let i = 0; i < rows.length; i++) {
            const line = rows[i].trim();
            if (line === "") continue;
            // Skip header if present
            if (i === 0 && (line.toLowerCase().includes("username") || line.toLowerCase().includes("password"))) continue;
            
            const parts = line.split(",");
            if (parts.length >= 2) {
                const username = parts[0].trim();
                const password = parts[1].trim();
                let role = parts.length >= 3 ? parts[2].trim().toUpperCase() : "";
                
                // Determine role based on username pattern if not specified
                if (!role) {
                    if (username === "Admin" || username === "admin") role = "ADMIN";
                    else if (username === "HHR2026") role = "HHR";
                    else if (username === "HHD2026") role = "HHD";
                    else if (username === "NATSUP2026") role = "NATSUP";
                    else role = "ADMIN";
                }
                
                if (username && password) {
                    credentials.push({ username, password, role });
                }
            }
        }
        
        if (credentials.length === 0) {
            // Fallback as per requirement
            credentials.push(
                { username: "Admin", password: "123", role: "ADMIN" },
                { username: "HHR2026", password: "123455", role: "HHR" },
                { username: "HHD2026", password: "123456", role: "HHD" },
                { username: "NATSUP2026", password: "123200", role: "NATSUP" }
            );
        }
        
        userCredentials = credentials;
        console.log("Loaded credentials:", userCredentials.map(c => ({user: c.username, role: c.role})));
        
    } catch (err) {
        console.warn("Error loading Keys.csv, using default users:", err);
        userCredentials = [
            { username: "Admin", password: "123", role: "ADMIN" },
            { username: "HHR2026", password: "123455", role: "HHR" },
            { username: "HHD2026", password: "123456", role: "HHD" },
            { username: "NATSUP2026", password: "123200", role: "NATSUP" }
        ];
    }
}

function authenticateUser(username, password) {
    const matched = userCredentials.find(cred => 
        cred.username === username && cred.password === password
    );
    if (matched) {
        return ROLE_CONFIG[matched.role] || ROLE_CONFIG.ADMIN;
    }
    return null;
}

// Function to load mscreen.html and apply card visibility rules
function loadMscreenWithRole(roleConfig, username) {
    const container = document.getElementById("appContainer");
    if (!container) return;
    
    // Show loading indicator
    const loadingDiv = document.createElement("div");
    loadingDiv.className = "loading-overlay";
    loadingDiv.innerHTML = '<i class="fa-solid fa-spinner fa-pulse"></i> Loading dashboard...';
    document.body.appendChild(loadingDiv);
    
    // Create iframe wrapper
    const iframeWrapper = document.createElement("div");
    iframeWrapper.style.width = "100%";
    iframeWrapper.style.height = "100vh";
    iframeWrapper.style.position = "relative";
    iframeWrapper.style.background = "#f4f6f9";
    iframeWrapper.style.borderRadius = "30px";
    iframeWrapper.style.overflow = "hidden";
    
    const iframe = document.createElement("iframe");
    // Pass role info via URL parameter for mscreen.html to read
    const hiddenCardsParam = encodeURIComponent(roleConfig.hiddenCards.join(","));
    iframe.src = `mscreen.html?role=${roleConfig.name}&hiddenCards=${hiddenCardsParam}`;
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.border = "none";
    iframe.style.display = "block";
    
    let loadAttempted = false;
    
    // When iframe loads, apply visibility rules directly
    iframe.onload = () => {
        loadAttempted = true;
        setTimeout(() => {
            try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (iframeDoc) {
                    applyCardVisibilityInIframe(iframeDoc, roleConfig.hiddenCards);
                }
                // Also send postMessage for additional safety
                try {
                    iframe.contentWindow.postMessage({
                        type: "SET_CARD_VISIBILITY",
                        role: roleConfig.name,
                        hiddenCards: roleConfig.hiddenCards
                    }, "*");
                } catch(e) {}
            } catch(e) { console.warn("Cannot access iframe DOM", e); }
            
            // Remove loading overlay
            if (loadingDiv) loadingDiv.remove();
        }, 600);
    };
    
    // Iframe error handling
    iframe.onerror = () => {
        if (loadingDiv) loadingDiv.remove();
        if (!loadAttempted) {
            showFallbackDashboard(roleConfig, username);
        }
    };
    
    iframeWrapper.appendChild(iframe);
    
    // Replace container content
    container.innerHTML = "";
    container.style.maxHeight = "100vh";
    container.style.height = "100vh";
    container.style.borderRadius = "0";
    container.appendChild(iframeWrapper);
    
    // Add logout button overlay
    const logoutBtn = document.createElement("button");
    logoutBtn.innerHTML = '<i class="fa-solid fa-sign-out-alt"></i> Logout';
    logoutBtn.style.position = "absolute";
    logoutBtn.style.top = "15px";
    logoutBtn.style.right = "20px";
    logoutBtn.style.zIndex = "9999";
    logoutBtn.style.backgroundColor = "#e74c3c";
    logoutBtn.style.color = "white";
    logoutBtn.style.border = "none";
    logoutBtn.style.borderRadius = "30px";
    logoutBtn.style.padding = "8px 14px";
    logoutBtn.style.fontWeight = "bold";
    logoutBtn.style.fontSize = "14px";
    logoutBtn.style.cursor = "pointer";
    logoutBtn.style.boxShadow = "0 2px 8px rgba(0,0,0,0.2)";
    logoutBtn.style.display = "flex";
    logoutBtn.style.alignItems = "center";
    logoutBtn.style.gap = "6px";
    logoutBtn.onclick = () => {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().catch(() => {});
        }
        location.reload();
    };
    iframeWrapper.style.position = "relative";
    iframeWrapper.appendChild(logoutBtn);
    
    // Timeout fallback
    setTimeout(() => {
        if (loadingDiv && loadingDiv.parentNode) {
            loadingDiv.remove();
        }
    }, 5000);
}

// Apply card visibility by hiding specific card elements in mscreen.html
function applyCardVisibilityInIframe(doc, hiddenCards) {
    if (!doc) return;
    
    // Comprehensive selectors for each card type in mscreen.html
    // Cards likely have IDs or classes like: .card-distribution, #distributionCard, [data-card="distribution"], etc.
    const cardSelectors = {
        "REGISTER": ['#registerCard', '#register-card', '.register-card', '[data-card="register"]', '.card-register', 'div:contains("REGISTER")'],
        "DISTRIBUTION": ['#distributionCard', '#distribution-card', '.distribution-card', '[data-card="distribution"]', '.card-distribution'],
        "MONITORING": ['#monitoringCard', '#monitoring-card', '.monitoring-card', '[data-card="monitoring"]', '.card-monitoring'],
        "STOCK": ['#stockCard', '#stock-card', '.stock-card', '[data-card="stock"]', '.card-stock'],
        "DASHBOARD": ['#dashboardCard', '#dashboard-card', '.dashboard-card', '[data-card="dashboard"]', '.card-dashboard'],
        "ATTENDANCE": ['#attendanceCard', '#attendance-card', '.attendance-card', '[data-card="attendance"]', '.card-attendance'],
        "DEVICE TRACKING": ['#deviceTrackingCard', '#device-tracking-card', '.device-tracking-card', '[data-card="device-tracking"]', '.card-device', '#deviceCard']
    };
    
    // Also try to find any element containing the card title text
    function hideByText(doc, text) {
        const allElements = doc.querySelectorAll('.card, [class*="card"], [class*="Card"], .dashboard-card, .menu-item');
        allElements.forEach(el => {
            if (el.innerText && el.innerText.toUpperCase().includes(text.toUpperCase())) {
                el.style.display = 'none';
                el.style.visibility = 'hidden';
                // Also hide parent if needed
                const parentCard = el.closest('.card, [class*="card-item"], .grid-item');
                if (parentCard && parentCard !== el) parentCard.style.display = 'none';
            }
        });
    }
    
    // For each card type that should be hidden, try all selectors
    hiddenCards.forEach(cardName => {
        const selectors = cardSelectors[cardName] || [];
        selectors.forEach(selector => {
            try {
                const elements = doc.querySelectorAll(selector);
                elements.forEach(el => {
                    el.style.display = 'none';
                    el.style.visibility = 'hidden';
                });
            } catch(e) {}
        });
        // Also try text-based hiding as fallback
        const friendlyName = cardName.replace(/_/g, ' ');
        hideByText(doc, friendlyName);
    });
    
    // Additionally, hide any navigation tabs or menu items related to these cards
    hiddenCards.forEach(cardName => {
        const tabSelectors = {
            "REGISTER": ['a[href*="register"]', 'button[data-tab="register"]', '.nav-register', '#register-tab'],
            "DISTRIBUTION": ['a[href*="distribution"]', 'button[data-tab="distribution"]', '.nav-distribution', '#distribution-tab'],
            "MONITORING": ['a[href*="monitoring"]', 'button[data-tab="monitoring"]', '.nav-monitoring', '#monitoring-tab'],
            "STOCK": ['a[href*="stock"]', 'button[data-tab="stock"]', '.nav-stock', '#stock-tab'],
            "DASHBOARD": ['a[href*="dashboard"]', 'button[data-tab="dashboard"]', '.nav-dashboard', '#dashboard-tab'],
            "ATTENDANCE": ['a[href*="attendance"]', 'button[data-tab="attendance"]', '.nav-attendance', '#attendance-tab'],
            "DEVICE TRACKING": ['a[href*="device"]', 'button[data-tab="device"]', '.nav-device', '#device-tab', 'a[href*="tracking"]']
        };
        const tabList = tabSelectors[cardName] || [];
        tabList.forEach(selector => {
            try {
                const tabs = doc.querySelectorAll(selector);
                tabs.forEach(tab => { tab.style.display = 'none'; });
            } catch(e) {}
        });
    });
    
    console.log(`Applied visibility: hidden cards = ${hiddenCards.join(", ")}`);
}

// Fallback dashboard if mscreen.html doesn't exist
function showFallbackDashboard(roleConfig, username) {
    const container = document.getElementById("appContainer");
    if (!container) return;
    
    const hiddenList = roleConfig.hiddenCards.join(", ");
    const fallbackDiv = document.createElement("div");
    fallbackDiv.style.background = "linear-gradient(145deg, #e9f5f0 0%, #c8e6df 100%)";
    fallbackDiv.style.width = "100%";
    fallbackDiv.style.height = "100vh";
    fallbackDiv.style.display = "flex";
    fallbackDiv.style.flexDirection = "column";
    fallbackDiv.style.alignItems = "center";
    fallbackDiv.style.justifyContent = "center";
    fallbackDiv.style.textAlign = "center";
    fallbackDiv.style.padding = "20px";
    fallbackDiv.style.overflowY = "auto";
    
    fallbackDiv.innerHTML = `
        <div style="background: white; border-radius: 32px; padding: 30px 20px; max-width: 320px; box-shadow: 0 20px 35px rgba(0,0,0,0.2);">
            <i class="fa-solid fa-chalkboard-user" style="font-size: 60px; color: #1E8449; margin-bottom: 20px;"></i>
            <h1 style="color: #2E86C1;">Welcome, ${username}!</h1>
            <p style="font-size: 16px; margin: 15px 0;">Role: <strong>${roleConfig.name}</strong></p>
            <p style="background: #eef2f3; padding: 12px; border-radius: 40px; font-size: 13px;">
                <i class="fa-regular fa-eye-slash"></i> Hidden Cards: ${hiddenList || "None (Full Access)"}
            </p>
            <div style="margin-top: 20px;">
                <p style="font-size: 13px; color: #555;">mscreen.html not found. Please ensure the file exists.</p>
            </div>
            <button id="logoutFallbackBtn" style="margin-top: 25px; background: #e74c3c; color: white; border: none; padding: 10px 30px; border-radius: 40px; font-weight: bold; cursor: pointer;">LOGOUT</button>
        </div>
    `;
    container.innerHTML = "";
    container.style.height = "100vh";
    container.style.maxHeight = "100vh";
    container.appendChild(fallbackDiv);
    document.getElementById("logoutFallbackBtn")?.addEventListener("click", () => location.reload());
}

// Login handler
async function handleLogin() {
    const usernameInput = document.getElementById("username").value.trim();
    const passwordInput = document.getElementById("password").value.trim();
    
    if (!usernameInput || !passwordInput) {
        alert(isEnglish ? "Please enter username and password" : "Veuillez entrer le nom d'utilisateur et le mot de passe");
        return;
    }
    
    if (userCredentials.length === 0) {
        await loadKeysFromCSV();
    }
    
    const roleConfig = authenticateUser(usernameInput, passwordInput);
    
    if (roleConfig) {
        try {
            // Check if mscreen.html exists
            const checkResponse = await fetch("mscreen.html", { method: "HEAD" });
            if (checkResponse.ok) {
                loadMscreenWithRole(roleConfig, usernameInput);
            } else {
                showFallbackDashboard(roleConfig, usernameInput);
            }
        } catch (err) {
            showFallbackDashboard(roleConfig, usernameInput);
        }
    } else {
        alert(isEnglish ? "Invalid Username or Password" : "Nom d'utilisateur ou mot de passe incorrect");
    }
}

// Toggle password visibility
function togglePassword() {
    const password = document.getElementById("password");
    const icon = document.querySelector(".eye-icon");
    if (password.type === "password") {
        password.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        password.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}

// Language toggle
function toggleLanguage() {
    isEnglish = !isEnglish;
    const usernameField = document.getElementById("username");
    const passwordField = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const scanBtn = document.getElementById("scanBtn");
    const networkSpan = document.querySelector("#networkCard span");
    const exportSpan = document.querySelector("#exportCard span");
    const verifySpan = document.querySelector("#verifyCard span");
    const langSpan = document.getElementById("langText");
    const devText = document.getElementById("devText");

    if (!isEnglish) {
        usernameField.placeholder = "Nom d'utilisateur";
        passwordField.placeholder = "Mot de passe";
        loginBtn.innerText = "CONNEXION";
        scanBtn.innerText = "SCANNER BADGE";
        networkSpan.innerText = "RÉSEAU";
        exportSpan.innerText = "EXPORTER LES DONNÉES";
        verifySpan.innerText = "VÉRIFIER BÉNÉFICIAIRE";
        langSpan.innerText = "FRANÇAIS";
        devText.innerText = "Développé Par";
    } else {
        usernameField.placeholder = "USERNAME";
        passwordField.placeholder = "PASSWORD";
        loginBtn.innerText = "LOGIN";
        scanBtn.innerText = "SCAN BADGE";
        networkSpan.innerText = "NETWORK CHECK";
        exportSpan.innerText = "EXPORT CAMPAIGN LOGS";
        verifySpan.innerText = "VERIFY BENEFICIARY PRINT";
        langSpan.innerText = "ENGLISH";
        devText.innerText = "Developed By";
    }
}

// QR Scanner
function startScanner() {
    const modal = document.getElementById("scannerModal");
    modal.style.display = "flex";
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        qr => {
            alert(isEnglish ? "Scanned: " + qr : "Scanné: " + qr);
            stopScanner();
        }
    ).catch(err => console.error("Scanner error", err));
}

function stopScanner() {
    if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().then(() => {
            document.getElementById("scannerModal").style.display = "none";
        }).catch(() => {
            document.getElementById("scannerModal").style.display = "none";
        });
    } else {
        document.getElementById("scannerModal").style.display = "none";
    }
}

// Card event handlers for login page
function attachCardEvents() {
    document.getElementById("networkCard")?.addEventListener("click", () => {
        alert(isEnglish ? (navigator.onLine ? "Network connected." : "No internet connection") : (navigator.onLine ? "Réseau connecté." : "Pas de connexion internet"));
    });
    document.getElementById("exportCard")?.addEventListener("click", () => {
        alert(isEnglish ? "Export Campaign Logs feature will be available after login." : "L'exportation des journaux de campagne sera disponible après connexion.");
    });
    document.getElementById("verifyCard")?.addEventListener("click", () => {
        alert(isEnglish ? "Verify Beneficiary: Please login and use badge scanner." : "Vérifier bénéficiaire: Veuillez vous connecter et utiliser le scanner.");
    });
}

// Initialize app
async function init() {
    await loadKeysFromCSV();
    attachCardEvents();
    
    const loginBtn = document.getElementById("loginBtn");
    const newLoginBtn = loginBtn.cloneNode(true);
    loginBtn.parentNode.replaceChild(newLoginBtn, loginBtn);
    newLoginBtn.addEventListener("click", handleLogin);
    
    document.getElementById("password").addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleLogin();
    });
    
    const scanButton = document.getElementById("scanBtn");
    if (scanButton) {
        const newScanBtn = scanButton.cloneNode(true);
        scanButton.parentNode.replaceChild(newScanBtn, scanButton);
        newScanBtn.onclick = startScanner;
    }
}

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
