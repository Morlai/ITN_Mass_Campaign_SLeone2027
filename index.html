<!DOCTYPE html>
<html lang="en"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ITNs Campaign Login - Role Specific Dashboards</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

body {
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Phone container */
.container {
    width: 360px;
    max-width: 100%;
    height: 100vh;
    max-height: 780px;
    background: #fff;
    border-radius: 30px;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
}

/* Background image */
.bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('background.png') no-repeat center/cover;
    z-index: 0;
}
.bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
}

/* Main content */
.content {
    position: relative;
    z-index: 2;
    padding: 20px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.login-card {
    background: rgba(255,255,255,0.96);
    border-radius: 24px;
    padding: 20px 16px;
    margin-top: 20px;
    backdrop-filter: blur(2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.logo {
    text-align: center;
    margin-bottom: 16px;
}
.logo img {
    width: 65px;
    border-radius: 50%;
    background: white;
    padding: 4px;
    object-fit: cover;
}

.input {
    width: 100%;
    padding: 14px 12px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 40px;
    font-size: 16px;
    background: #fff;
    outline: none;
    transition: border 0.2s;
}
.input:focus {
    border-color: #2E86C1;
}

.password-wrapper {
    position: relative;
}
.password-wrapper input {
    padding-right: 50px;
}
.eye-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #555;
    font-size: 1.2rem;
}

.btn {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 40px;
    color: white;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
}
.btn:hover {
    transform: scale(1.02);
    opacity: 0.9;
}
.login {
    background: #2E86C1;
}
.scan {
    background: #1E8449;
}

.cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 20px 0 10px 0;
}
.card {
    border-radius: 20px;
    padding: 14px 6px;
    text-align: center;
    color: white;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}
.card:hover {
    transform: scale(1.02);
}
.card i {
    font-size: 26px;
}
.network { background: #D35400; }
.export { background: #2E86C1; }
.verify { background: #8E44AD; }
.language { background: #16A085; }

/* Curve and footer */
.curve-wrapper {
    position: relative;
    z-index: 2;
    margin-top: auto;
}
.curve {
    width: 100%;
    height: 50px;
    display: block;
}
.footer {
    background: #1E8449;
    padding: 12px 16px 20px;
    text-align: center;
    color: white;
    border-radius: 20px 20px 0 0;
}
.footer h4 {
    font-size: 11px;
    font-weight: normal;
}
.footer p {
    font-size: 13px;
    text-decoration: underline;
    font-weight: bold;
    margin-top: 4px;
}

/* Scanner modal */
#scannerModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
    flex-direction: column;
}
#reader {
    width: 280px;
    border-radius: 20px;
    overflow: hidden;
}
.close-btn {
    margin-top: 20px;
    padding: 10px 24px;
    background: #e74c3c;
    color: white;
    border: none;
    border-radius: 40px;
    font-size: 1rem;
    cursor: pointer;
}

/* Mobile responsive */
@media (max-width: 380px) {
    .container {
        width: 100%;
        height: 100vh;
        border-radius: 0;
    }
    .login-card {
        padding: 16px 12px;
    }
    .cards {
        gap: 10px;
    }
    .card {
        padding: 10px 4px;
        font-size: 11px;
    }
    .card i {
        font-size: 22px;
    }
}

.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    color: white;
    font-size: 18px;
    gap: 12px;
    backdrop-filter: blur(3px);
}
</style>
</head>
<body>

<div class="container" id="appContainer">
    <div class="bg"></div>
    <div class="content">
        <div class="login-card">
            <div class="logo">
                <img src="ICF-SL Logo.jpg" alt="ICF-SL Logo" onerror="this.src='https://placehold.co/200x200/2E86C1/white?text=ICF-SL'">
            </div>
            <input id="username" class="input" placeholder="USERNAME" autocomplete="off">
            <div class="password-wrapper">
                <input id="password" class="input" type="password" placeholder="PASSWORD">
                <i class="fa-solid fa-eye eye-icon" onclick="togglePassword()"></i>
            </div>
            <button id="loginBtn" class="btn login">LOGIN</button>
            <button id="scanBtn" class="btn scan">SCAN BADGE</button>
        </div>

        <div class="cards">
            <div class="card network" id="networkCard">
                <i class="fa-solid fa-wifi"></i>
                <span>NETWORK CHECK</span>
            </div>
            <div class="card export" id="exportCard">
                <i class="fa-solid fa-download"></i>
                <span>EXPORT CAMPAIGN LOGS</span>
            </div>
            <div class="card verify" id="verifyCard">
                <i class="fa-solid fa-fingerprint"></i>
                <span>VERIFY BENEFICIARY PRINT</span>
            </div>
            <div class="card language" id="languageCard">
                <i class="fa-solid fa-language"></i>
                <span id="langText">ENGLISH</span>
            </div>
        </div>
    </div>

    <!-- Curve + Footer -->
    <div class="curve-wrapper">
        <svg class="curve" viewBox="0 0 500 100" preserveAspectRatio="none">
            <path d="M0,65 C80,95 140,100 200,75 C260,50 320,40 380,60 C430,75 470,70 500,65 L500,100 L0,100 Z" fill="#1E8449"/>
        </svg>
        <div class="footer">
            <h4 id="devText">Developed By</h4>
            <p>Informatic Consultancy Firm-SL ©2026</p>
        </div>
    </div>
</div>

<!-- QR SCANNER MODAL -->
<div id="scannerModal">
    <div id="reader"></div>
    <button class="close-btn" onclick="stopScanner()">Close</button>
</div>

<script>
// ============================================================
// ROLE-BASED DASHBOARD MAPPING (based on username & CSV)
// CSV format: username,password,dashboard_file
// Default mappings:
// Admin,123,mscreen.html
// HHR2026,123455,mscreenreg.html
// HHD2026,123456,mscreendist.html
// NATSUP2026,123200,mscreenmoni.html
// CHISUP2026,123100,mscreenatt.html
// PHUSTAFF2026,123300,mscreenstock.html
// PARTNERS2026,123,mscreendash.html
// ============================================================

let isEnglish = true;
let html5QrCode;
let userDatabase = []; // Stores {username, password, dashboard}

// Default fallback in case CSV fails to load (as per requirement)
const DEFAULT_USERS = [
    { username: "Admin", password: "123", dashboard: "mscreen.html" },
    { username: "HHR2026", password: "123455", dashboard: "mscreenreg.html" },
    { username: "HHD2026", password: "123456", dashboard: "mscreendist.html" },
    { username: "NATSUP2026", password: "123200", dashboard: "mscreenmoni.html" },
    { username: "CHISUP2026", password: "123100", dashboard: "mscreenatt.html" },
    { username: "PHUSTAFF2026", password: "123300", dashboard: "mscreenstock.html" },
    { username: "PARTNERS2026", password: "123", dashboard: "mscreendash.html" }
];

// Load Keys.csv and parse it. CSV columns: username,password,dashboard (optional)
async function loadKeysFromCSV() {
    try {
        const response = await fetch("Keys.csv");
        if (!response.ok) throw new Error("Keys.csv not found, using default user list");
        const data = await response.text();
        const rows = data.split(/\r?\n/);
        const credentials = [];
        
        for (let i = 0; i < rows.length; i++) {
            const line = rows[i].trim();
            if (line === "") continue;
            // Skip header if present
            if (i === 0 && (line.toLowerCase().includes("username") || line.toLowerCase().includes("user"))) continue;
            
            const parts = line.split(",");
            if (parts.length >= 2) {
                const username = parts[0].trim();
                const password = parts[1].trim();
                let dashboard = parts.length >= 3 ? parts[2].trim() : "";
                
                // Assign dashboard based on username pattern if not specified in CSV (backward compatibility)
                if (!dashboard) {
                    if (username === "Admin" || username === "admin") dashboard = "mscreen.html";
                    else if (username === "HHR2026") dashboard = "mscreenreg.html";
                    else if (username === "HHD2026") dashboard = "mscreendist.html";
                    else if (username === "NATSUP2026") dashboard = "mscreenmoni.html";
                    else if (username === "CHISUP2026") dashboard = "mscreenatt.html";
                    else if (username === "PHUSTAFF2026") dashboard = "mscreenstock.html";
                    else if (username === "PARTNERS2026") dashboard = "mscreendash.html";
                    else dashboard = "mscreen.html"; // default fallback
                }
                
                if (username && password) {
                    credentials.push({ username, password, dashboard });
                }
            }
        }
        
        if (credentials.length === 0) {
            console.log("No valid entries in CSV, using default users");
            return [...DEFAULT_USERS];
        }
        
        console.log("Loaded from CSV:", credentials.map(c => ({user: c.username, dash: c.dashboard})));
        return credentials;
        
    } catch (err) {
        console.warn("Error reading Keys.csv, using default user database:", err);
        return [...DEFAULT_USERS];
    }
}

// Authenticate user and return dashboard file name
function authenticateAndGetDashboard(username, password, userList) {
    const matched = userList.find(cred => 
        cred.username === username && cred.password === password
    );
    if (matched) {
        return matched.dashboard;
    }
    return null;
}

// Load dashboard inside iframe with proper styling and logout button
function loadDashboardInIframe(dashboardFile, username) {
    const container = document.getElementById("appContainer");
    if (!container) return;
    
    // Show loading indicator
    const loadingDiv = document.createElement("div");
    loadingDiv.className = "loading-overlay";
    loadingDiv.innerHTML = '<i class="fa-solid fa-spinner fa-pulse fa-2x"></i><span>Loading dashboard...</span>';
    document.body.appendChild(loadingDiv);
    
    // Create wrapper for iframe
    const iframeWrapper = document.createElement("div");
    iframeWrapper.style.width = "100%";
    iframeWrapper.style.height = "100vh";
    iframeWrapper.style.position = "relative";
    iframeWrapper.style.background = "#f4f6f9";
    iframeWrapper.style.borderRadius = "30px";
    iframeWrapper.style.overflow = "hidden";
    
    const iframe = document.createElement("iframe");
    // Add timestamp to avoid cache issues
    iframe.src = `${dashboardFile}?t=${Date.now()}`;
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.border = "none";
    iframe.style.display = "block";
    
    let loadTimeout;
    
    // Remove loading and handle errors
    const clearLoading = () => {
        if (loadingDiv && loadingDiv.parentNode) loadingDiv.remove();
        if (loadTimeout) clearTimeout(loadTimeout);
    };
    
    iframe.onload = () => {
        clearLoading();
        // Optional: send message to iframe for user info if needed
        try {
            if (iframe.contentWindow) {
                iframe.contentWindow.postMessage({ type: "USER_LOGGED_IN", username: username, dashboard: dashboardFile }, "*");
            }
        } catch(e) {}
    };
    
    iframe.onerror = () => {
        clearLoading();
        showFallbackError(dashboardFile, username);
    };
    
    // Fallback timeout
    loadTimeout = setTimeout(() => {
        if (loadingDiv && loadingDiv.parentNode) {
            clearLoading();
            console.warn("Iframe load timeout");
            showFallbackError(dashboardFile, username);
        }
    }, 8000);
    
    iframeWrapper.appendChild(iframe);
    
    // Replace container content
    container.innerHTML = "";
    container.style.maxHeight = "100vh";
    container.style.height = "100vh";
    container.style.borderRadius = "0";
    container.appendChild(iframeWrapper);
    
    // Add logout button on top (floating)
    const logoutBtn = document.createElement("button");
    logoutBtn.innerHTML = '<i class="fa-solid fa-sign-out-alt"></i> Logout';
    logoutBtn.style.position = "absolute";
    logoutBtn.style.top = "15px";
    logoutBtn.style.right = "20px";
    logoutBtn.style.zIndex = "9999";
    logoutBtn.style.backgroundColor = "#e74c3c";
    logoutBtn.style.color = "white";
    logoutBtn.style.border = "none";
    logoutBtn.style.borderRadius = "30px";
    logoutBtn.style.padding = "8px 14px";
    logoutBtn.style.fontWeight = "bold";
    logoutBtn.style.fontSize = "14px";
    logoutBtn.style.cursor = "pointer";
    logoutBtn.style.boxShadow = "0 2px 8px rgba(0,0,0,0.3)";
    logoutBtn.style.display = "flex";
    logoutBtn.style.alignItems = "center";
    logoutBtn.style.gap = "6px";
    logoutBtn.style.backdropFilter = "blur(2px)";
    logoutBtn.onclick = () => {
        if (html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().catch(() => {});
        }
        location.reload();
    };
    iframeWrapper.style.position = "relative";
    iframeWrapper.appendChild(logoutBtn);
}

// Fallback error display if dashboard HTML not found
function showFallbackError(dashboardFile, username) {
    const container = document.getElementById("appContainer");
    if (!container) return;
    
    const errorDiv = document.createElement("div");
    errorDiv.style.background = "linear-gradient(145deg, #fff5f5 0%, #ffe0e0 100%)";
    errorDiv.style.width = "100%";
    errorDiv.style.height = "100vh";
    errorDiv.style.display = "flex";
    errorDiv.style.flexDirection = "column";
    errorDiv.style.alignItems = "center";
    errorDiv.style.justifyContent = "center";
    errorDiv.style.textAlign = "center";
    errorDiv.style.padding = "20px";
    
    errorDiv.innerHTML = `
        <div style="background: white; border-radius: 32px; padding: 30px 20px; max-width: 320px; box-shadow: 0 20px 35px rgba(0,0,0,0.2);">
            <i class="fa-solid fa-triangle-exclamation" style="font-size: 60px; color: #e67e22; margin-bottom: 20px;"></i>
            <h2 style="color: #c0392b;">Dashboard Error</h2>
            <p style="margin: 15px 0; font-size: 14px;">Could not load <strong>${dashboardFile}</strong></p>
            <p style="background: #f2f2f2; padding: 10px; border-radius: 30px; font-size: 12px;">Please ensure the file exists in the same directory.</p>
            <button id="retryLoginBtn" style="margin-top: 25px; background: #2E86C1; color: white; border: none; padding: 10px 30px; border-radius: 40px; font-weight: bold; cursor: pointer;">BACK TO LOGIN</button>
        </div>
    `;
    container.innerHTML = "";
    container.style.height = "100vh";
    container.appendChild(errorDiv);
    document.getElementById("retryLoginBtn")?.addEventListener("click", () => location.reload());
}

// Main login handler
async function handleLogin() {
    const usernameInput = document.getElementById("username").value.trim();
    const passwordInput = document.getElementById("password").value.trim();
    
    if (!usernameInput || !passwordInput) {
        alert(isEnglish ? "Please enter username and password" : "Veuillez entrer le nom d'utilisateur et le mot de passe");
        return;
    }
    
    // Load fresh credentials every login attempt (in case CSV updates)
    const userList = await loadKeysFromCSV();
    
    const dashboardFile = authenticateAndGetDashboard(usernameInput, passwordInput, userList);
    
    if (dashboardFile) {
        // Check if the dashboard file exists via HEAD request (optional)
        try {
            const checkResponse = await fetch(dashboardFile, { method: "HEAD" });
            if (checkResponse.ok) {
                loadDashboardInIframe(dashboardFile, usernameInput);
            } else {
                showFallbackError(dashboardFile, usernameInput);
            }
        } catch (err) {
            console.warn("Fetch check failed, attempting to load anyway");
            loadDashboardInIframe(dashboardFile, usernameInput);
        }
    } else {
        alert(isEnglish ? "Invalid Username or Password" : "Nom d'utilisateur ou mot de passe incorrect");
    }
}

// Toggle password visibility
function togglePassword() {
    const password = document.getElementById("password");
    const icon = document.querySelector(".eye-icon");
    if (password.type === "password") {
        password.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        password.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}

// Language toggle (UI only on login screen)
function toggleLanguage() {
    isEnglish = !isEnglish;
    const usernameField = document.getElementById("username");
    const passwordField = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const scanBtn = document.getElementById("scanBtn");
    const networkSpan = document.querySelector("#networkCard span");
    const exportSpan = document.querySelector("#exportCard span");
    const verifySpan = document.querySelector("#verifyCard span");
    const langSpan = document.getElementById("langText");
    const devText = document.getElementById("devText");

    if (!isEnglish) {
        usernameField.placeholder = "Nom d'utilisateur";
        passwordField.placeholder = "Mot de passe";
        loginBtn.innerText = "CONNEXION";
        scanBtn.innerText = "SCANNER BADGE";
        networkSpan.innerText = "RÉSEAU";
        exportSpan.innerText = "EXPORTER LES DONNÉES";
        verifySpan.innerText = "VÉRIFIER BÉNÉFICIAIRE";
        langSpan.innerText = "FRANÇAIS";
        devText.innerText = "Développé Par";
    } else {
        usernameField.placeholder = "USERNAME";
        passwordField.placeholder = "PASSWORD";
        loginBtn.innerText = "LOGIN";
        scanBtn.innerText = "SCAN BADGE";
        networkSpan.innerText = "NETWORK CHECK";
        exportSpan.innerText = "EXPORT CAMPAIGN LOGS";
        verifySpan.innerText = "VERIFY BENEFICIARY PRINT";
        langSpan.innerText = "ENGLISH";
        devText.innerText = "Developed By";
    }
}

// QR Scanner with Html5Qrcode
function startScanner() {
    const modal = document.getElementById("scannerModal");
    modal.style.display = "flex";
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        qr => {
            alert(isEnglish ? "Scanned: " + qr : "Scanné: " + qr);
            stopScanner();
        }
    ).catch(err => {
        console.error("Scanner error", err);
        alert(isEnglish ? "Camera error: Unable to start scanner" : "Erreur de caméra");
        stopScanner();
    });
}

function stopScanner() {
    if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().then(() => {
            document.getElementById("scannerModal").style.display = "none";
        }).catch(() => {
            document.getElementById("scannerModal").style.display = "none";
        });
    } else {
        document.getElementById("scannerModal").style.display = "none";
    }
}

// Attach card event handlers on login page
function attachCardEvents() {
    const networkCard = document.getElementById("networkCard");
    if (networkCard) {
        networkCard.addEventListener("click", () => {
            alert(isEnglish ? (navigator.onLine ? "Network connected." : "No internet connection") : (navigator.onLine ? "Réseau connecté." : "Pas de connexion internet"));
        });
    }
    const exportCard = document.getElementById("exportCard");
    if (exportCard) {
        exportCard.addEventListener("click", () => {
            alert(isEnglish ? "Export Campaign Logs feature will be available after login." : "L'exportation des journaux de campagne sera disponible après connexion.");
        });
    }
    const verifyCard = document.getElementById("verifyCard");
    if (verifyCard) {
        verifyCard.addEventListener("click", () => {
            alert(isEnglish ? "Verify Beneficiary: Please login and use badge scanner." : "Vérifier bénéficiaire: Veuillez vous connecter et utiliser le scanner.");
        });
    }
    const langCard = document.getElementById("languageCard");
    if (langCard) {
        langCard.addEventListener("click", toggleLanguage);
    }
}

// Initialize app
async function init() {
    // Preload credentials but not mandatory
    await loadKeysFromCSV(); // just to warm up, but login will reload
    
    attachCardEvents();
    
    // Fix event listeners for buttons after DOM ready
    const loginBtn = document.getElementById("loginBtn");
    if (loginBtn) {
        // Remove any existing listeners by cloning
        const newLoginBtn = loginBtn.cloneNode(true);
        loginBtn.parentNode.replaceChild(newLoginBtn, loginBtn);
        newLoginBtn.addEventListener("click", handleLogin);
    }
    
    const passwordField = document.getElementById("password");
    if (passwordField) {
        passwordField.addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleLogin();
        });
    }
    
    const scanButton = document.getElementById("scanBtn");
    if (scanButton) {
        const newScanBtn = scanButton.cloneNode(true);
        scanButton.parentNode.replaceChild(newScanBtn, scanButton);
        newScanBtn.addEventListener("click", startScanner);
    }
    
    // Language card already attached via attachCardEvents
}

// Start everything when DOM ready
document.addEventListener("DOMContentLoaded", init);
</script>
</body> 
</html>
