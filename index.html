<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITNs Campaign Splash</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    width: 350px;
    height: 700px;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    background: #fff;
}

/* Image Section */
.image-section {
    height: 72%;
    position: relative;
    background: url('background.png') no-repeat center center/cover;
}

/* Overlay */
.image-section::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(46, 204, 113, 0.10);
}

/* Time Badge */
.time-badge {
    position: absolute;
    top: 15px;
    left: 20px;
    background: #C0392B;
    color: white;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    z-index: 2;
}

/* Curve */
.curve {
    display: block;
    width: 100%;
    height: 45px;
    margin-top: -12px;
}

/* Footer */
.footer {
    height: 28%;
    background: #1E8449;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Text */
.footer h4 {
    font-size: 11px;
    margin-bottom: 2px;
}

.footer p {
    font-size: 13px;
    font-weight: bold;
    text-decoration: underline;
}

</style>
</head>

<body>

<div class="container">

    <div class="image-section">
        <div class="time-badge">14:50</div>
    </div>

    <!-- 🔥 TRUE IMAGE-LIKE CURVE -->
    <svg class="curve" viewBox="0 0 500 100" preserveAspectRatio="none">
        <path d="
            M0,65
            C80,95 140,100 200,75
            C260,50 320,40 380,60
            C430,75 470,70 500,65
            L500,100
            L0,100
            Z"
            fill="#1E8449"/>
    </svg>

    <div class="footer">
        <h4>Developed By</h4>
        <p>Informatic Consultancy Firm-SL@2026</p>
    </div>

</div>

</body>
</html>
