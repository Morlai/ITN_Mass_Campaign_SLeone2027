<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ITNs Campaign Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

body {
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Phone container - flex column, no absolute overlapping */
.container {
    width: 360px;
    max-width: 100%;
    height: 100vh;
    max-height: 780px;
    background: #fff;
    border-radius: 30px;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
}

/* Background image (optional) */
.bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('background.png') no-repeat center/cover;
    z-index: 0;
}
.bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
}

/* Main content - scrollable if needed */
.content {
    position: relative;
    z-index: 2;
    padding: 20px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.login-card {
    background: rgba(255,255,255,0.96);
    border-radius: 24px;
    padding: 20px 16px;
    margin-top: 20px;
    backdrop-filter: blur(2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.logo {
    text-align: center;
    margin-bottom: 16px;
}
.logo img {
    width: 65px;
    border-radius: 50%;
    background: white;
    padding: 4px;
}

.input {
    width: 100%;
    padding: 14px 12px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 40px;
    font-size: 16px; /* prevents zoom on iOS */
    background: #fff;
}

.password-wrapper {
    position: relative;
}
.password-wrapper input {
    padding-right: 50px;
}
.eye-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #555;
    font-size: 1.2rem;
}

.btn {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 40px;
    color: white;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.2s;
}
.btn:hover {
    transform: scale(1.02);
    opacity: 0.9;
}
.login {
    background: #2E86C1;
}
.scan {
    background: #1E8449;
}

.cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 20px 0 10px 0;
}
.card {
    border-radius: 20px;
    padding: 14px 6px;
    text-align: center;
    color: white;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}
.card:hover {
    transform: scale(1.02);
}
.card i {
    font-size: 26px;
}
.network { background: #D35400; }
.export { background: #2E86C1; }
.verify { background: #8E44AD; }
.language { background: #16A085; }

/* Curve and footer as normal flow elements (no absolute) */
.curve-wrapper {
    position: relative;
    z-index: 2;
    margin-top: auto;
}
.curve {
    width: 100%;
    height: 50px;
    display: block;
}
.footer {
    background: #1E8449;
    padding: 12px 16px 20px;
    text-align: center;
    color: white;
    border-radius: 20px 20px 0 0;
}
.footer h4 {
    font-size: 11px;
    font-weight: normal;
}
.footer p {
    font-size: 13px;
    text-decoration: underline;
    font-weight: bold;
    margin-top: 4px;
}

/* Scanner modal */
#scannerModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
    flex-direction: column;
}
#reader {
    width: 280px;
    border-radius: 20px;
    overflow: hidden;
}
.close-btn {
    margin-top: 20px;
    padding: 10px 24px;
    background: #e74c3c;
    color: white;
    border: none;
    border-radius: 40px;
    font-size: 1rem;
    cursor: pointer;
}

/* Mobile responsive */
@media (max-width: 380px) {
    .container {
        width: 100%;
        height: 100vh;
        border-radius: 0;
    }
    .login-card {
        padding: 16px 12px;
    }
    .cards {
        gap: 10px;
    }
    .card {
        padding: 10px 4px;
        font-size: 11px;
    }
    .card i {
        font-size: 22px;
    }
}

/* Dashboard preview (mscreen fallback style) - if mscreen.html not available */
.dashboard-placeholder {
    width: 100%;
    height: 100vh;
    background: linear-gradient(145deg, #e9f5f0 0%, #c8e6df 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    font-family: monospace;
}
.dashboard-placeholder h1 {
    color: #1E8449;
    margin-bottom: 20px;
}
.dashboard-placeholder p {
    font-size: 18px;
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<div class="container" id="appContainer">
    <div class="bg"></div>
    <div class="content">
        <div class="login-card">
            <div class="logo">
                <!-- Using a modern placeholder icon since external logo may not exist, but keep img tag -->
                <img src="https://placehold.co/200x200/2E86C1/white?text=ICF-SL" alt="ICF-SL Logo" style="background:white; padding:4px;">
            </div>
            <input id="username" class="input" placeholder="USERNAME" autocomplete="off">
            <div class="password-wrapper">
                <input id="password" class="input" type="password" placeholder="PASSWORD">
                <i class="fa-solid fa-eye eye-icon" onclick="togglePassword()"></i>
            </div>
            <button id="loginBtn" class="btn login">LOGIN</button>
            <button id="scanBtn" class="btn scan" onclick="startScanner()">SCAN BADGE</button>
        </div>

        <div class="cards">
            <div class="card network" id="networkCard">
                <i class="fa-solid fa-wifi"></i>
                <span>NETWORK CHECK</span>
            </div>
            <div class="card export" id="exportCard">
                <i class="fa-solid fa-download"></i>
                <span>EXPORT CAMPAIGN LOGS</span>
            </div>
            <div class="card verify" id="verifyCard">
                <i class="fa-solid fa-fingerprint"></i>
                <span>VERIFY BENEFICIARY PRINT</span>
            </div>
            <div class="card language" onclick="toggleLanguage()">
                <i class="fa-solid fa-language"></i>
                <span id="langText">ENGLISH</span>
            </div>
        </div>
    </div>

    <!-- Curve + Footer as normal elements -->
    <div class="curve-wrapper">
        <svg class="curve" viewBox="0 0 500 100" preserveAspectRatio="none">
            <path d="M0,65 C80,95 140,100 200,75 C260,50 320,40 380,60 C430,75 470,70 500,65 L500,100 L0,100 Z" fill="#1E8449"/>
        </svg>
        <div class="footer">
            <h4 id="devText">Developed By</h4>
            <p>Informatic Consultancy Firm-SL ©2026</p>
        </div>
    </div>
</div>

<!-- QR SCANNER MODAL -->
<div id="scannerModal">
    <div id="reader"></div>
    <button class="close-btn" onclick="stopScanner()">Close</button>
</div>

<script>
// ============================================================
// GLOBAL VARIABLES
// ============================================================
let isEnglish = true;
let html5QrCode;
let userDatabase = []; // Stores { username, password, redirectPage }

// ============================================================
// 1. LOAD CREDENTIALS FROM Keys.csv (username, password, redirect_tab)
//    Format expectation: username,password,redirect_page
//    Example row: admin,admin123,admin_dashboard.html
//    If redirect_page missing, fallback to "mscreen.html"
// ============================================================
async function loadKeysFromCSV() {
    try {
        const response = await fetch("Keys.csv");
        if (!response.ok) throw new Error("Keys.csv not found");
        const data = await response.text();
        const rows = data.split(/\r?\n/);
        // Remove empty lines and trim
        const parsed = [];
        for (let i = 0; i < rows.length; i++) {
            const line = rows[i].trim();
            if (line === "") continue;
            // Skip header if present (optional: if first line contains "username" ignore)
            const isHeader = line.toLowerCase().includes("username") && line.toLowerCase().includes("password");
            if (i === 0 && (isHeader || line.startsWith("username"))) continue;
            
            const parts = line.split(",");
            if (parts.length >= 2) {
                const username = parts[0].trim();
                const password = parts[1].trim();
                let redirectPage = parts.length >= 3 ? parts[2].trim() : "mscreen.html";
                // ensure redirectPage has .html or .htm fallback
                if (!redirectPage.endsWith(".html") && !redirectPage.endsWith(".htm") && redirectPage !== "") {
                    redirectPage = redirectPage + ".html";
                }
                if (username && password) {
                    parsed.push({ username, password, redirectPage });
                }
            }
        }
        
        if (parsed.length === 0) {
            // fallback demo users in case CSV empty
            console.warn("Keys.csv empty or invalid format, using demo users with respective tabs.");
            userDatabase = [
                { username: "supervisor", password: "super123", redirectPage: "supervisor_panel.html" },
                { username: "fieldagent", password: "field123", redirectPage: "field_dashboard.html" },
                { username: "admin", password: "admin123", redirectPage: "mscreen.html" },
                { username: "coordinator", password: "coord123", redirectPage: "coordinator_view.html" }
            ];
        } else {
            userDatabase = parsed;
        }
        
        console.log("Loaded credentials:", userDatabase.map(u => ({user: u.username, page: u.redirectPage})));
        
    } catch (err) {
        console.error("Error loading Keys.csv:", err);
        // Fallback to default user set that maps to respective tabs based on username
        userDatabase = [
            { username: "supervisor", password: "super123", redirectPage: "supervisor_panel.html" },
            { username: "fieldagent", password: "field123", redirectPage: "field_dashboard.html" },
            { username: "admin", password: "admin123", redirectPage: "mscreen.html" },
            { username: "coordinator", password: "coord123", redirectPage: "coordinator_view.html" }
        ];
    }
}

// ============================================================
// 2. LOGIN HANDLER: validate against Keys.csv and redirect to respective tab/page
//    based on the username's assigned redirect_page from CSV
// ============================================================
async function performLogin() {
    const usernameInput = document.getElementById("username").value.trim();
    const passwordInput = document.getElementById("password").value.trim();
    
    if (!usernameInput || !passwordInput) {
        alert(isEnglish ? "Please enter username and password" : "Veuillez entrer le nom d'utilisateur et le mot de passe");
        return;
    }
    
    // Find matching user in database loaded from Keys.csv
    const matchedUser = userDatabase.find(user => 
        user.username.toLowerCase() === usernameInput.toLowerCase() && 
        user.password === passwordInput
    );
    
    if (matchedUser) {
        // Get the redirect target page for this specific user
        let targetPage = matchedUser.redirectPage;
        if (!targetPage) targetPage = "mscreen.html";
        
        // Optional: if the target page doesn't exist, we still load - but to improve experience
        // We will replace entire body with iframe/dynamic load.
        // For robust behavior: load target page in iframe, but also show meaningful error if not found (graceful)
        showDashboard(targetPage, matchedUser.username);
    } else {
        alert(isEnglish ? "Invalid Username or Password" : "Nom d'utilisateur ou mot de passe incorrect");
    }
}

// Function to replace the login container with dashboard (iframe or inline content)
function showDashboard(pageUrl, userName) {
    const container = document.getElementById("appContainer");
    if (!container) return;
    
    // Create fullscreen iframe wrapper
    const iframeWrapper = document.createElement("div");
    iframeWrapper.style.width = "100%";
    iframeWrapper.style.height = "100vh";
    iframeWrapper.style.position = "relative";
    iframeWrapper.style.background = "#fff";
    iframeWrapper.style.borderRadius = "30px";
    iframeWrapper.style.overflow = "hidden";
    
    const iframe = document.createElement("iframe");
    iframe.src = pageUrl;
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.border = "none";
    iframe.style.display = "block";
    
    // Error handling: if the page fails to load (404), show a friendly dynamic dashboard
    iframe.onerror = () => {
        showFallbackDashboard(userName, pageUrl);
    };
    
    iframeWrapper.appendChild(iframe);
    
    // Replace container content
    container.innerHTML = "";
    container.style.maxHeight = "100vh";
    container.style.height = "100vh";
    container.style.borderRadius = "0";
    container.appendChild(iframeWrapper);
    
    // Try to catch load error for 404 (if iframe fails to load)
    setTimeout(() => {
        try {
            // Check if iframe contentWindow is accessible and document is not undefined
            if (iframe.contentDocument && iframe.contentDocument.location.href === "about:blank") {
                // still loading? but if after 1 sec still blank, might be error
            }
        } catch(e) {
            // cross-origin or load error may trigger this; but we show fallback after a delay if src not loaded
        }
    }, 800);
    
    // Additional check: listen for iframe load event to see if content is actually loaded
    iframe.onload = () => {
        // iframe loaded successfully, fine
        console.log(`Dashboard ${pageUrl} loaded for ${userName}`);
    };
}

// Fallback dashboard if the specific HTML file is missing (graceful)
function showFallbackDashboard(username, requestedPage) {
    const container = document.getElementById("appContainer");
    if (!container) return;
    const fallbackDiv = document.createElement("div");
    fallbackDiv.className = "dashboard-placeholder";
    fallbackDiv.innerHTML = `
        <div style="background: white; border-radius: 32px; padding: 30px 20px; max-width: 320px; box-shadow: 0 20px 35px rgba(0,0,0,0.2);">
            <i class="fa-solid fa-chalkboard-user" style="font-size: 60px; color: #1E8449; margin-bottom: 20px;"></i>
            <h1 style="color: #2E86C1;">Welcome, ${username}!</h1>
            <p style="font-size: 16px; margin: 15px 0;">Your personalized dashboard for the ITNs Campaign.</p>
            <p style="background: #eef2f3; padding: 12px; border-radius: 40px; font-size: 14px;">
                <i class="fa-regular fa-file"></i> Requested: ${requestedPage}
            </p>
            <p style="margin-top: 20px; font-size: 13px; color: gray;">Campaign tools & analytics available. Please contact administrator if you expected a different view.</p>
            <button id="logoutFallbackBtn" style="margin-top: 25px; background: #e74c3c; color: white; border: none; padding: 10px 30px; border-radius: 40px; font-weight: bold; cursor: pointer;">LOGOUT</button>
        </div>
    `;
    container.innerHTML = "";
    container.appendChild(fallbackDiv);
    document.getElementById("logoutFallbackBtn")?.addEventListener("click", () => {
        location.reload();
    });
}

// ============================================================
// 3. QR SCANNER & OTHER FUNCTIONALITY (unchanged but integrated)
// ============================================================
function startScanner() {
    const modal = document.getElementById("scannerModal");
    modal.style.display = "flex";
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        qr => {
            alert(isEnglish ? "Scanned: " + qr : "Scanné: " + qr);
            stopScanner();
        }
    ).catch(err => {
        console.error("Scanner error", err);
        alert(isEnglish ? "Camera access error" : "Erreur d'accès à la caméra");
        stopScanner();
    });
}

function stopScanner() {
    if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().then(() => {
            document.getElementById("scannerModal").style.display = "none";
        }).catch(() => {
            document.getElementById("scannerModal").style.display = "none";
        });
    } else {
        document.getElementById("scannerModal").style.display = "none";
    }
}

function togglePassword() {
    const password = document.getElementById("password");
    const icon = document.querySelector(".eye-icon");
    if (password.type === "password") {
        password.type = "text";
        icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
        password.type = "password";
        icon.classList.replace("fa-eye-slash", "fa-eye");
    }
}

function toggleLanguage() {
    isEnglish = !isEnglish;
    const usernameField = document.getElementById("username");
    const passwordField = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const scanBtn = document.getElementById("scanBtn");
    const networkSpan = document.querySelector("#networkCard span");
    const exportSpan = document.querySelector("#exportCard span");
    const verifySpan = document.querySelector("#verifyCard span");
    const langSpan = document.getElementById("langText");
    const devText = document.getElementById("devText");

    if (!isEnglish) {
        usernameField.placeholder = "Nom d'utilisateur";
        passwordField.placeholder = "Mot de passe";
        loginBtn.innerText = "CONNEXION";
        scanBtn.innerText = "SCANNER BADGE";
        networkSpan.innerText = "RÉSEAU";
        exportSpan.innerText = "EXPORTER LES DONNÉES";
        verifySpan.innerText = "VÉRIFIER BÉNÉFICIAIRE";
        langSpan.innerText = "FRANÇAIS";
        devText.innerText = "Développé Par";
    } else {
        usernameField.placeholder = "USERNAME";
        passwordField.placeholder = "PASSWORD";
        loginBtn.innerText = "LOGIN";
        scanBtn.innerText = "SCAN BADGE";
        networkSpan.innerText = "NETWORK CHECK";
        exportSpan.innerText = "EXPORT CAMPAIGN LOGS";
        verifySpan.innerText = "VERIFY BENEFICIARY PRINT";
        langSpan.innerText = "ENGLISH";
        devText.innerText = "Developed By";
    }
}

// Network check, Export, Verify card functionality - show informative alerts with respective user context if logged in later, but these cards stay on main page
// For better user experience we keep them interactive even before login
function attachCardEvents() {
    const networkCard = document.getElementById("networkCard");
    const exportCard = document.getElementById("exportCard");
    const verifyCard = document.getElementById("verifyCard");
    
    networkCard.addEventListener("click", () => {
        if (navigator.onLine) {
            alert(isEnglish ? "Network connected. You are online." : "Réseau connecté. Vous êtes en ligne.");
        } else {
            alert(isEnglish ? "No internet connection." : "Pas de connexion internet.");
        }
    });
    
    exportCard.addEventListener("click", () => {
        alert(isEnglish ? "Export feature: Campaign logs would be exported. (Simulated)" : "Exportation: Les journaux de campagne seraient exportés. (Simulé)");
    });
    
    verifyCard.addEventListener("click", () => {
        alert(isEnglish ? "Verify Beneficiary Print: feature ready. Use badge scanner for verification." : "Vérifier l'impression du bénéficiaire: fonction prête. Utilisez le scanner de badge.");
    });
}

// ============================================================
// 4. Initialize Application: load Keys.csv and attach login handlers
// ============================================================
async function initApp() {
    await loadKeysFromCSV();    // load user db with respective redirect pages
    attachCardEvents();
    
    // Attach login button event
    const loginBtn = document.getElementById("loginBtn");
    // remove any previous listeners by clone? but it's safe
    const newLoginBtn = loginBtn.cloneNode(true);
    loginBtn.parentNode.replaceChild(newLoginBtn, loginBtn);
    newLoginBtn.addEventListener("click", performLogin);
    
    // Also allow Enter key on password field
    const passwordInput = document.getElementById("password");
    passwordInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            performLogin();
        }
    });
    
    // Additionally scan button may be reattached (already using onclick global, but ensure safety)
    const scanButton = document.getElementById("scanBtn");
    if (scanButton) {
        // remove previous onclick if any
        const newScanBtn = scanButton.cloneNode(true);
        scanButton.parentNode.replaceChild(newScanBtn, scanButton);
        newScanBtn.onclick = startScanner;
    }
    
    // Also language toggle works globally
    window.toggleLanguage = toggleLanguage;
    window.togglePassword = togglePassword;
    window.startScanner = startScanner;
    window.stopScanner = stopScanner;
}

// Start everything when DOM ready
document.addEventListener("DOMContentLoaded", initApp);
</script>
</body>
</html>
