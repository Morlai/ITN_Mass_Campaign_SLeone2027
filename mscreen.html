<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICF-SL | ITN Campaign</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#e5e5e5;display:flex;justify-content:center}
.phone{max-width:360px;width:100%;background:#fff;height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{background:#0b5ed7;color:#fff;text-align:center;padding:8px}
.header img{height:30px}
.header h2{font-size:10px}
.header p{font-size:8px}
.header h3{font-size:9px}

/* PARTNERS */
.partner-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:5px}
.partner-item{text-align:center;font-size:7px}
.partner-item img{width:100%;height:25px;object-fit:contain;border:1px solid #ddd;border-radius:4px}

/* CAROUSEL */
.carousel{position:relative;overflow:hidden;margin:8px;border-radius:12px}
.slides{display:flex;transition:.4s}
.slide{min-width:100%;height:150px}
.slide img{width:100%;height:100%;object-fit:cover}
.btn{position:absolute;top:50%;transform:translateY(-50%);background:#0008;color:#fff;border:none;width:30px;height:30px;border-radius:50%}
.prev{left:5px}
.next{right:5px}

/* ACTION CARDS */
.actions{padding:10px;display:flex;flex-direction:column;gap:12px}
.card{border-radius:20px;padding:15px;color:#fff;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.card i{font-size:20px}
.register{background:linear-gradient(#1E3A8A,#3B82F6)}
.distribution{background:linear-gradient(#0F5B2E,#2E9A5E)}
.stock{background:linear-gradient(#C2410C,#F97316)}
.dashboard{background:linear-gradient(#0F5B7A,#14B8A6)}

/* FOOTER */
.footer{text-align:center;background:#0b5ed7;color:#fff;font-size:8px;padding:5px}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#0009;display:none;align-items:center;justify-content:center}
.modal-box{background:#fff;padding:20px;border-radius:20px;width:80%}
.modal input{width:100%;padding:8px;margin:5px 0;border-radius:10px;border:1px solid #ccc}
.modal button{padding:10px;width:48%;border:none;border-radius:20px}
.login{background:#0b5ed7;color:#fff}
.cancel{background:#ddd}

/* IFRAME */
.iframe{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:none;flex-direction:column}
.iframe header{background:#0b5ed7;color:#fff;padding:10px;display:flex;justify-content:space-between}
iframe{flex:1;border:none}
</style>
</head>

<body>

<div class="phone">

<div class="header">
<img src="ICF-SL Logo.jpg">
<h2>Informatics Consultancy Firm-SL</h2>
<p>Driving Data-Driven Solutions</p>
<h3>ITN DISTRIBUTION CAMPAIGN</h3>
</div>

<div class="partner-grid">
<div class="partner-item"><img src="usa.png"><span>USA</span></div>
<div class="partner-item"><img src="global_fund.png"><span>Global Fund</span></div>
<div class="partner-item"><img src="moh_logo.png"><span>MOH</span></div>
</div>

<div class="carousel">
<div class="slides" id="slides">
<div class="slide"><img src="infographics.png"></div>
<div class="slide"><img src="infographicss.jpg"></div>
<div class="slide"><img src="infographics.jpg"></div>
</div>
<button class="btn prev" onclick="move(-1)">❮</button>
<button class="btn next" onclick="move(1)">❯</button>
</div>

<div class="actions">
<div class="card register" onclick="openLogin('REGISTER')"><span>REGISTER (HHR)</span><i class="fas fa-home"></i></div>
<div class="card distribution" onclick="openLogin('DISTRIBUTION')"><span>DISTRIBUTION (HHD)</span><i class="fas fa-users"></i></div>
<div class="card stock" onclick="openLogin('STOCK')"><span>STOCK</span><i class="fas fa-box"></i></div>
<div class="card dashboard" onclick="openLogin('DASHBOARD')"><span>DASHBOARD</span><i class="fas fa-chart-line"></i></div>
</div>

<div class="footer">
Developed By ICF-SL ©2026
</div>

</div>

<!-- LOGIN -->
<div class="modal" id="modal">
<div class="modal-box">
<h3>Login</h3>
<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<div style="display:flex;justify-content:space-between">
<button class="cancel" onclick="closeModal()">Cancel</button>
<button class="login" onclick="login()">Login</button>
</div>
<p id="error" style="color:red;font-size:12px"></p>
</div>
</div>

<!-- IFRAME -->
<div class="iframe" id="iframeBox">
<header>
<span>Registration</span>
<button onclick="closeFrame()">✖</button>
</header>
<iframe src="registration.html"></iframe>
</div>

<script>
let index=0
function move(dir){
const slides=document.getElementById('slides')
index+=dir
if(index<0)index=2
if(index>2)index=0
slides.style.transform=`translateX(-${index*100}%)`
}

let action=""
function openLogin(a){
action=a
document.getElementById('modal').style.display='flex'
}
function closeModal(){
document.getElementById('modal').style.display='none'
}
function login(){
let u=document.getElementById('user').value
let p=document.getElementById('pass').value

if(u==="admin" && p==="1234"){
closeModal()
if(action==="REGISTER"){
document.getElementById('iframeBox').style.display='flex'
}else{
alert(action+" Access Granted")
}
}else{
document.getElementById('error').innerText="Invalid login"
}
}
function closeFrame(){
document.getElementById('iframeBox').style.display='none'
}
</script>

</body>
</html>
